     Architecture:
       1. Custom Vanilla JS Entity-Component-System (ECS)
       2. LittleJS engine for render loop, input, & ZzFX audio
       3. Integration layer bridging ECS ↔ LittleJS lifecycle
       4. Proof-of-concept: Player entity with 2.5D depth rendering
     
     Design Principles:
       • Data-only Components (plain objects, no methods)
       • Logic-only Systems (functions that query components)
       • LittleJS handles: RAF loop, canvas management, input polling,
         camera transforms, and ZzFX procedural audio
       • ECS handles: all game state, physics, AI, loot, combat, etc.
     ============================================================ -->

<script>
'use strict';

/* ================================================================

   ██████╔╝██║     ███████║██║  ██║█████╗  █████╗  ███████║██║     ██║     
   ██╔══██╗██║     ██╔══██║██║  ██║██╔══╝  ██╔══╝  ██╔══██║██║     ██║     
   ██████╔╝███████╗██║  ██║██████╔╝███████╗██║     ██║  ██║███████╗███████╗
   ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═════╝ ╚══════╝╚═╝     ╚═╝  ╚═╝╚══════╝╚══════╝
   
   Step 1: Core Architecture Boilerplate
   Version: 5.0.0-alpha (ECS Rebuild)
   ================================================================ */

const VERSION = '5.0.0-alpha';

/* ================================================================
   SECTION 1: ENTITY-COMPONENT-SYSTEM (ECS)
   
   A minimal, high-performance ECS designed for a 2D action-RPG.
   
   Terminology:
     • Entity   — A unique integer ID. Nothing more.
     • Component — A plain data object (no methods) attached to an entity.
                   Identified by a string name (e.g., 'Position', 'Health').
     • System   — A function that runs every frame, querying entities
                   by their component signature and mutating their data.
   
   Why ECS?
     • Composition over inheritance — mix & match capabilities freely.
     • Cache-friendly iteration — systems process arrays of components.
     • Easy to extend — adding a new mechanic = new Component + new System.
     • Decoupled logic — systems don't know about each other.
   ================================================================ */

class EntityManager {
  constructor() {
    /**
     * Auto-incrementing entity ID counter.
     * Entity 0 is reserved (never created) so we can use 0 as "null entity".
     */
    this._nextId = 1;

    /**
     * Master component storage.
     * Structure: Map<componentName, Map<entityId, componentData>>
     * 
     * Example:
     *   _components.get('Position') => Map { 1 => {x:0, z:0, jy:0}, 2 => {x:100, z:50, jy:0} }
     *   _components.get('Health')   => Map { 1 => {hp:100, maxHp:100} }
     */
    this._components = new Map();

    /**
     * Set of all living entity IDs.
     * Used for fast existence checks and iteration.
     */
    this._entities = new Set();

    /**
     * Entities scheduled for destruction at end of frame.
     * Deferred deletion prevents iterator invalidation during system updates.
     */
    this._destroyQueue = [];

    /**
     * Registered systems, executed in insertion order.
     * Each entry: { name: string, requiredComponents: string[], fn: Function, phase: string }
     * 
     * Phases:
     *   'update'     — runs during gameUpdate() (logic, physics, AI)
     *   'render'     — runs during gameRender() (world-space drawing, behind objects)
     *   'renderPost' — runs during gameRenderPost() (HUD, overlays, screen-space)
     */
    this._systems = [];

    /**
     * Component pool for recycling (optional optimization).
     * Structure: Map<componentName, componentData[]>
     * Not used in Step 1 but the slot is here for Step 2+.
     */
    this._pools = new Map();
  }

  /* ────────────────────────────────────────────────────────────────
     ENTITY LIFECYCLE
     ──────────────────────────────────────────────────────────────── */

  /**
   * Create a new entity and return its ID.
   * Entities start with zero components — attach them separately.
   */
  createEntity() {
    const id = this._nextId++;
    this._entities.add(id);
    return id;
  }

  /**
   * Schedule an entity for destruction at end of frame.
   * All its components will be removed during the flush.
   */
  destroyEntity(id) {
    this._destroyQueue.push(id);
  }

  /**
   * Check if an entity still exists (hasn't been destroyed).
   */
  entityExists(id) {
    return this._entities.has(id);
  }

  /**
   * Flush the destroy queue. Called once per frame after all systems run.
   */
  flushDestroyQueue() {
    for (const id of this._destroyQueue) {
      // Remove all components for this entity
      for (const [, store] of this._components) {
        store.delete(id);
      }
      this._entities.delete(id);
    }
    this._destroyQueue.length = 0;
  }

  /* ────────────────────────────────────────────────────────────────
     COMPONENT MANAGEMENT
     
     Components are plain objects. The ECS doesn't enforce a schema;
     that's the responsibility of the factory functions (see Section 2).
     ──────────────────────────────────────────────────────────────── */

  /**
   * Attach a component to an entity.
   * @param {number} entityId
   * @param {string} componentName — e.g., 'Position', 'Velocity', 'Health'
   * @param {object} data — the component data object
   * @returns {object} the attached data (for chaining)
   */
  addComponent(entityId, componentName, data) {
    if (!this._components.has(componentName)) {
      this._components.set(componentName, new Map());
    }
    this._components.get(componentName).set(entityId, data);
    return data;
  }

  /**
   * Remove a component from an entity.
   * @returns {boolean} true if the component existed and was removed
   */
  removeComponent(entityId, componentName) {
    const store = this._components.get(componentName);
    return store ? store.delete(entityId) : false;
  }

  /**
   * Get a single component for an entity.
   * @returns {object|undefined} the component data, or undefined
   */
  getComponent(entityId, componentName) {
    const store = this._components.get(componentName);
    return store ? store.get(entityId) : undefined;
  }

  /**
   * Check if an entity has a specific component.
   */
  hasComponent(entityId, componentName) {
    const store = this._components.get(componentName);
    return store ? store.has(entityId) : false;
  }

  /**
   * Get the entire component store for a given component name.
   * Returns Map<entityId, componentData> — useful for systems that
   * need to iterate ALL entities with a given component.
   */
  getComponentStore(componentName) {
    return this._components.get(componentName) || new Map();
  }

  /* ────────────────────────────────────────────────────────────────
     QUERIES
     
     Query entities by component signature. Returns arrays of entity IDs
     that possess ALL of the requested components.
     ──────────────────────────────────────────────────────────────── */

  /**
   * Find all entity IDs that have ALL of the specified components.
   * This is the primary query method used by systems.
   * 
   * Performance: O(n) where n = size of the smallest component store.
   * For a game with ~100 entities, this is negligible.
   * 
   * @param {...string} componentNames — one or more component names
   * @returns {number[]} array of matching entity IDs
   */
  query(...componentNames) {
    if (componentNames.length === 0) return [];

    // Start with the smallest store for efficiency
    let smallestName = componentNames[0];
    let smallestSize = Infinity;
    for (const name of componentNames) {
      const store = this._components.get(name);
      const size = store ? store.size : 0;
      if (size < smallestSize) {
        smallestSize = size;
        smallestName = name;
      }
    }

    if (smallestSize === 0) return [];

    const smallestStore = this._components.get(smallestName);
    const results = [];

    for (const entityId of smallestStore.keys()) {
      let hasAll = true;
      for (const name of componentNames) {
        if (name === smallestName) continue;
        const store = this._components.get(name);
        if (!store || !store.has(entityId)) {
          hasAll = false;
          break;
        }
      }
      if (hasAll) results.push(entityId);
    }

    return results;
  }

  /* ────────────────────────────────────────────────────────────────
     SYSTEM REGISTRATION & EXECUTION
     ──────────────────────────────────────────────────────────────── */

  /**
   * Register a system.
   * 
   * @param {string} name — human-readable name for debugging
   * @param {string[]} requiredComponents — component signature for auto-query
   * @param {Function} fn — system function: fn(entities[], ecs, dt)
   * @param {string} [phase='update'] — when to run: 'update', 'render', 'renderPost'
   */
  registerSystem(name, requiredComponents, fn, phase = 'update') {
    this._systems.push({ name, requiredComponents, fn, phase });
  }

  /**
   * Run all systems for a given phase.
   * Called by the LittleJS lifecycle hooks.
   * 
   * @param {string} phase — 'update', 'render', or 'renderPost'
   * @param {number} dt — delta time in seconds
   */
  runSystems(phase, dt) {
    for (const sys of this._systems) {
      if (sys.phase !== phase) continue;

      // Auto-query entities matching this system's required components
      const entities = this.query(...sys.requiredComponents);

      // Execute the system logic
      sys.fn(entities, this, dt);
    }
  }

  /* ────────────────────────────────────────────────────────────────
     DEBUG / INTROSPECTION
     ──────────────────────────────────────────────────────────────── */

  /**
   * Get a snapshot of the ECS state for debugging.
   */
  debugInfo() {
    const componentCounts = {};
    for (const [name, store] of this._components) {
      componentCounts[name] = store.size;
    }
    return {
      entities: this._entities.size,
      components: componentCounts,
      systems: this._systems.map(s => `${s.name} [${s.phase}]`),
      pendingDestroy: this._destroyQueue.length,
    };
  }
}

/* ================================================================
   SECTION 2: COMPONENT FACTORIES
   
   Components are plain data objects created by factory functions.
   This ensures consistent shape (V8 hidden classes) and serves
   as self-documenting schema for each component type.
   
   Convention: factory names match component names exactly.
   Example: Components.Position() creates a 'Position' component.
   ================================================================ */

const Components = {

  /**
   * Position — world-space coordinates in the 2.5D plane.
   * 
   * x  — horizontal position (left/right scroll axis)
   * z  — depth position (0 = far/top, DEPTH = near/bottom)
   *       Controls both rendering sort order and perspective scale.
   * jy — jump height above the ground plane (0 = on ground)
   *       Separate from z to allow independent vertical movement.
   */
  Position(x = 0, z = 0, jy = 0) {
    return { x, z, jy };
  },

  /**
   * Velocity — per-frame movement rates.
   * 
   * vx — horizontal velocity (pixels/sec)
   * vz — depth velocity (pixels/sec)
   * vy — vertical velocity for jump arcs (pixels/sec, negative = up)
   */
  Velocity(vx = 0, vz = 0, vy = 0) {
    return { vx, vz, vy };
  },

  /**
   * Dimensions — entity hitbox / visual bounds.
   * 
   * w — width in world units
   * h — height in world units
   */
  Dimensions(w = 26, h = 44) {
    return { w, h };
  },

  /**
   * DepthRenderable — marks an entity for 2.5D depth-sorted rendering.
   * 
   * The RenderSystem uses this to:
   *   1. Compute screen Y from depth (z → ground line via perspective)
   *   2. Compute scale from depth (far = smaller, near = larger)
   *   3. Sort all renderables by z for painter's algorithm
   * 
   * drawFn — a function(ctx, entity, ecs, screenY, scale) that
   *           performs the actual procedural canvas drawing.
   *           This is set per-entity to allow unique visuals.
   * visible — can be toggled to hide without removing the component.
   * sortBias — allows fine-tuning sort order within same z.
   */
  DepthRenderable(drawFn = null, visible = true, sortBias = 0) {
    return { drawFn, visible, sortBias };
  },

  /**
   * Health — hit points for damageable entities.
   */
  Health(hp = 100, maxHp = 100) {
    return { hp, maxHp };
  },

  /**
   * PlayerTag — empty marker component to identify the player entity.
   * Systems can query for ['PlayerTag'] to find the player quickly.
   */
  PlayerTag() {
    return { isPlayer: true };
  },

  /**
   * PhysicsBody — flags for the physics system.
   * 
   * onGround — whether the entity is on the ground plane
   * gravity  — gravitational acceleration (pixels/sec²)
   * friction — horizontal deceleration multiplier (0-1 per frame)
   */
  PhysicsBody(gravity = 1400, friction = 0.85) {
    return { onGround: true, gravity, friction };
  },

  /**
   * Facing — which direction an entity faces (for sprite mirroring).
   * face: 1 = right, -1 = left
   */
  Facing(face = 1) {
    return { face };
  },

  /**
   * AnimationState — tracks animation timers for procedural rendering.
   */
  AnimationState() {
    return {
      runAnim: 0,     // Leg cycle phase
      idleBob: 0,     // Idle breathing bob
      totalTime: 0,   // Accumulator for continuous animations
    };
  },

  /**
   * CameraTarget — marks this entity as the camera follow target.
   */
  CameraTarget() {
    return { isCameraTarget: true };
  },

  /**
   * InputReceiver — marks this entity as controlled by player input.
   * The InputSystem will write movement intents here.
   */
  InputReceiver() {
    return {
      moveX: 0,   // -1 to 1 horizontal intent
      moveZ: 0,   // -1 to 1 depth intent
      jump: false,
      attack: false,
      dodge: false,
    };
  },
};


/* ================================================================
   SECTION 3: GAME CONSTANTS & 2.5D PERSPECTIVE
   
   These define the visual perspective of the pseudo-3D ground plane.
   The depth band runs from z=0 (far/top) to z=DEPTH (near/bottom).
   Entities at z=0 are smaller and drawn first (painter's algorithm).
   ================================================================ */

/** Total walkable depth band in world units */
const DEPTH = 210;

/** Viewport dimensions (updated on resize) */
let VW = 0, VH = 0;

/** Ground line screen-Y positions (updated on resize) */
let GROUND_FAR = 0, GROUND_NEAR = 0;

/**
 * Compute ground screen-Y for a given depth z.
 * z=0 → GROUND_FAR (top of ground band)
 * z=DEPTH → GROUND_NEAR (bottom of ground band)
 */
function groundY(z) {
  return GROUND_FAR + (z / DEPTH) * (GROUND_NEAR - GROUND_FAR);
}

/**
 * Compute perspective scale for a given depth z.
 * Far entities are ~80% scale, near entities are ~112% scale.
 * This creates the parallax depth illusion.
 */
function scaleAtDepth(z) {
  return 0.80 + 0.32 * (z / DEPTH);
}

/**
 * Recalculate viewport-dependent values.
 * Called on window resize and orientation change.
 */
function recalcViewport() {
  VW = mainCanvas.width;
  VH = mainCanvas.height;
  GROUND_NEAR = VH - Math.max(96, VH * 0.13);
  GROUND_FAR = GROUND_NEAR - Math.max(140, VH * 0.24);
}


/* ================================================================
   SECTION 4: PROCEDURAL DRAWING UTILITIES
   
   Helper functions for the procedural canvas rendering pipeline.
   These draw character parts, weapons, effects, etc. using only
   the Canvas2D API — no sprite sheets, no external images.
   ================================================================ */

/** Draw a shadow ellipse on the ground beneath an entity */
function drawShadow(ctx, groundScreenY, width) {
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, groundScreenY, width, width * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/** Draw a rounded rectangle path */
function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/** Interpolate between two hex colors */
function lerpColor(a, b, t) {
  const pa = hexToRGB(a), pb = hexToRGB(b);
  return `rgb(${Math.round(pa[0] + (pb[0] - pa[0]) * t)},${Math.round(pa[1] + (pb[1] - pa[1]) * t)},${Math.round(pa[2] + (pb[2] - pa[2]) * t)})`;
}

function hexToRGB(c) {
  c = c.replace('#', '');
  if (c.length === 3) c = c.split('').map(x => x + x).join('');
  return [parseInt(c.substr(0, 2), 16), parseInt(c.substr(2, 2), 16), parseInt(c.substr(4, 2), 16)];
}

/** Draw a line between two points */
function drawLine(ctx, x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

/** Draw a filled triangle */
function drawTriangle(ctx, x1, y1, x2, y2, x3, y3) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.closePath();
  ctx.fill();
}


/* ================================================================
   SECTION 5: PROCEDURAL ENTITY RENDERERS
   
   These are the `drawFn` callbacks stored in DepthRenderable components.
   Each function receives (ctx, entityId, ecs, scale) and draws the
   entity's visual representation procedurally on the canvas.
   
   The ctx is already translated to the entity's screen position
   and the ground-relative offset (jy) has been applied.
   ================================================================ */

/**
 * Draw the Player character — a detailed procedural knight.
 * Ported from the original Bladefall's skin system but adapted
 * for the ECS architecture.
 */
function drawPlayer(ctx, entityId, ecs, scale) {
  const pos = ecs.getComponent(entityId, 'Position');
  const dim = ecs.getComponent(entityId, 'Dimensions');
  const facing = ecs.getComponent(entityId, 'Facing');
  const anim = ecs.getComponent(entityId, 'AnimationState');
  const vel = ecs.getComponent(entityId, 'Velocity');
  const physics = ecs.getComponent(entityId, 'PhysicsBody');
  if (!pos || !dim || !facing) return;

  const t = anim ? anim.totalTime : 0;
  const moving = vel && Math.abs(vel.vx) > 20 && physics && physics.onGround;
  const bob = moving
    ? Math.sin((anim ? anim.runAnim : 0) * 2) * 1.0
    : Math.sin(t * 2) * 0.6;
  const legA = Math.sin(anim ? anim.runAnim : 0) * (moving ? 7 : 0);

  // Skin colors (Knight theme — will become data-driven in Step 2+)
  const ARMOR = '#3f566f';
  const ARMOR_LT = '#5d7da0';
  const TRIM = '#cfe0ef';
  const CAPE = '#28384e';
  const METAL = '#aeb9c6';
  const GLOW = '#9fc4ff';
  const TONE = '#f1d9c2';

  ctx.save();
  ctx.scale(facing.face, 1);

  // ── Cape (behind body) ──
  const sway = Math.sin(t * 4) * 3 + (moving ? 6 : 0) - (vel ? vel.vx * 0.02 : 0);
  ctx.save();
  ctx.translate(-5, -30 + bob);
  ctx.fillStyle = CAPE;
  ctx.beginPath();
  ctx.moveTo(2, -6);
  ctx.quadraticCurveTo(-13 - sway, 8, -10 - sway, 24);
  ctx.lineTo(-1, 22);
  ctx.quadraticCurveTo(-3, 4, 5, -2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // ── Legs ──
  ctx.fillStyle = '#1c2530';
  roundedRect(ctx, -8, -14, 7, 14 + legA, 2); ctx.fill();
  roundedRect(ctx, 2, -14, 7, 14 - legA, 2); ctx.fill();
  // Boot cuffs
  ctx.fillStyle = METAL;
  ctx.fillRect(-8, -3, 7, 3);
  ctx.fillRect(2, -3, 7, 3);

  ctx.save();
  ctx.translate(0, bob);

  // ── Body (plated armor) ──
  ctx.fillStyle = ARMOR;
  roundedRect(ctx, -10, -35, 20, 24, 4); ctx.fill();
  ctx.fillStyle = ARMOR_LT;
  roundedRect(ctx, -8, -34, 16, 11, 3); ctx.fill();
  // Center seam
  ctx.fillStyle = GLOW;
  ctx.globalAlpha = 0.9;
  ctx.fillRect(-1.5, -33, 3, 17);
  ctx.globalAlpha = 1;
  // Belt
  ctx.fillStyle = TRIM;
  ctx.fillRect(-10, -18, 20, 2.5);
  // Pauldrons
  ctx.fillStyle = ARMOR_LT;
  ctx.beginPath(); ctx.arc(-9, -33, 5, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -33, 5, 0, 6.28); ctx.fill();
  ctx.fillStyle = TRIM;
  ctx.beginPath(); ctx.arc(-9, -33, 2, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -33, 2, 0, 6.28); ctx.fill();

  // ── Head (helm) ──
  // Face
  ctx.fillStyle = TONE;
  roundedRect(ctx, -6, -47, 12, 12, 3); ctx.fill();
  // Helmet
  ctx.fillStyle = ARMOR;
  ctx.beginPath();
  ctx.moveTo(-7, -46); ctx.lineTo(7, -46); ctx.lineTo(7, -40);
  ctx.lineTo(3, -40); ctx.lineTo(3, -43); ctx.lineTo(-3, -43);
  ctx.lineTo(-3, -40); ctx.lineTo(-7, -40);
  ctx.closePath();
  ctx.fill();
  // Helmet band
  ctx.fillStyle = ARMOR_LT;
  ctx.fillRect(-7, -49, 14, 4);
  // Visor eyes
  ctx.fillStyle = GLOW;
  ctx.fillRect(-3.2, -42, 2.6, 2);
  ctx.fillRect(1, -42, 2.6, 2);
  // Plume
  ctx.fillStyle = GLOW;
  ctx.beginPath();
  ctx.moveTo(0, -53);
  ctx.quadraticCurveTo(9, -53, 6, -44);
  ctx.quadraticCurveTo(2, -48, -0.5, -49);
  ctx.closePath();
  ctx.fill();

  ctx.restore(); // undo bob translate

  // ── Arm + Weapon ──
  ctx.save();
  ctx.translate(6, -30 + bob);
  const ang = -0.45 + Math.sin(t * 2) * 0.05; // idle sway
  ctx.rotate(ang);
  // Arm
  ctx.strokeStyle = ARMOR_LT;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  drawLine(ctx, -2, 0, 8, 2);
  // Sword
  ctx.translate(8, 2);
  ctx.strokeStyle = '#dfe5ec';
  ctx.lineWidth = 5;
  drawLine(ctx, 0, 0, 28, 0);
  ctx.strokeStyle = '#9a8550';
  ctx.lineWidth = 3;
  drawLine(ctx, 2, -5, 2, 5);
  ctx.restore();

  ctx.restore(); // undo facing scale
}


/* ================================================================
   SECTION 6: SYSTEMS
   
   Logic-only functions that operate on entities via queries.
   Each system:
     1. Queries the ECS for entities with required components
     2. Reads/writes component data
     3. Has NO internal state (purely functional)
   ================================================================ */

/**
 * InputSystem — reads LittleJS input state and writes to InputReceiver.
 * Phase: 'update' (runs first so other systems can react to input)
 */
function InputSystem(entities, ecs, dt) {
  for (const id of entities) {
    const input = ecs.getComponent(id, 'InputReceiver');

    // Keyboard: WASD / Arrow keys
    let mx = 0, mz = 0;
    if (keyIsDown('ArrowLeft')  || keyIsDown('KeyA')) mx -= 1;
    if (keyIsDown('ArrowRight') || keyIsDown('KeyD')) mx += 1;
    if (keyIsDown('ArrowUp')    || keyIsDown('KeyW')) mz -= 1;
    if (keyIsDown('ArrowDown')  || keyIsDown('KeyS')) mz += 1;

    input.moveX = mx;
    input.moveZ = mz;
    input.jump = keyIsDown('Space') || keyIsDown('ArrowUp') || keyIsDown('KeyW');
    input.attack = keyIsDown('KeyJ');
    input.dodge = keyIsDown('KeyK') || keyIsDown('ShiftLeft');
  }
}

/**
 * MovementSystem — applies InputReceiver intents to Velocity.
 * Phase: 'update'
 */
function MovementSystem(entities, ecs, dt) {
  const MOVE_SPEED = 200;
  const DEPTH_SPEED = 120;

  for (const id of entities) {
    const input = ecs.getComponent(id, 'InputReceiver');
    const vel = ecs.getComponent(id, 'Velocity');
    const facing = ecs.getComponent(id, 'Facing');

    if (!input || !vel) continue;

    // Apply horizontal movement
    vel.vx = input.moveX * MOVE_SPEED;
    vel.vz = input.moveZ * DEPTH_SPEED;

    // Update facing direction
    if (facing && input.moveX !== 0) {
      facing.face = input.moveX > 0 ? 1 : -1;
    }

    // Jump (simple: set vy if on ground)
    const physics = ecs.getComponent(id, 'PhysicsBody');
    if (input.jump && physics && physics.onGround) {
      vel.vy = -480;
      physics.onGround = false;

      // Play jump sound via ZzFX
      zzfx(...[.03,,230,.01,.08,.13,1,.5,,,,,,,,,,.8,.04]);
    }
  }
}

/**
 * PhysicsSystem — applies velocity to position, handles gravity & ground clamping.
 * Phase: 'update'
 */
function PhysicsSystem(entities, ecs, dt) {
  for (const id of entities) {
    const pos = ecs.getComponent(id, 'Position');
    const vel = ecs.getComponent(id, 'Velocity');
    const physics = ecs.getComponent(id, 'PhysicsBody');
    if (!pos || !vel) continue;

    // Apply velocity
    pos.x += vel.vx * dt;
    pos.z += vel.vz * dt;

    // Gravity & vertical movement
    if (physics) {
      vel.vy += physics.gravity * dt;
      pos.jy -= vel.vy * dt; // jy increases upward

      // Ground collision
      if (pos.jy <= 0) {
        pos.jy = 0;
        vel.vy = 0;
        if (!physics.onGround) {
          physics.onGround = true;
          // Land sound
          zzfx(...[.02,,150,.01,.04,.08,1,1.5,,6,-50,.01,,,,,,,.04]);
        }
      }

      // Horizontal friction when on ground
      if (physics.onGround && vel.vx !== 0) {
        // Applied per-frame, not per-dt, matching original Bladefall
      }
    }

    // Clamp depth to walkable band
    if (pos.z < 0) pos.z = 0;
    if (pos.z > DEPTH) pos.z = DEPTH;

    // Clamp horizontal position (stage bounds — placeholder: 0 to 2000)
    if (pos.x < 20) pos.x = 20;
    if (pos.x > 1980) pos.x = 1980;
  }
}

/**
 * AnimationSystem — updates animation timers on entities.
 * Phase: 'update'
 */
function AnimationSystem(entities, ecs, dt) {
  for (const id of entities) {
    const anim = ecs.getComponent(id, 'AnimationState');
    const vel = ecs.getComponent(id, 'Velocity');
    if (!anim) continue;

    anim.totalTime += dt;

    // Run cycle animation
    if (vel && Math.abs(vel.vx) > 20) {
      anim.runAnim += dt * 12; // leg cycle speed
    } else {
      // Smoothly return to neutral
      anim.runAnim *= 0.85;
    }
  }
}

/**
 * CameraSystem — follows the CameraTarget entity.
 * Phase: 'update'
 * 
 * This system updates a global camera offset variable that the
 * RenderSystem uses to translate the world. LittleJS's built-in
 * cameraPos is in world-space tiles; we use our own pixel-based
 * camera for the 2.5D scrolling.
 */
let cameraX = 0;  // Global camera X offset (pixels)

function CameraSystem(entities, ecs, dt) {
  for (const id of entities) {
    const pos = ecs.getComponent(id, 'Position');
    if (!pos) continue;

    // Smooth camera follow (lerp toward player x, offset left-of-center)
    const targetCam = pos.x - VW * 0.35;
    cameraX += (targetCam - cameraX) * 0.08;

    // Clamp camera to stage bounds
    if (cameraX < 0) cameraX = 0;
  }
}

/**
 * DepthRenderSystem — the core 2.5D rendering pipeline.
 * Phase: 'render'
 * 
 * This system:
 *   1. Collects all entities with Position + DepthRenderable
 *   2. Sorts them by z (depth) for painter's algorithm (far → near)
 *   3. For each entity, computes screen position and perspective scale
 *   4. Calls the entity's custom drawFn with a positioned/scaled canvas context
 */
function DepthRenderSystem(entities, ecs, dt) {
  const ctx = mainContext;

  // Build sorted draw list
  const drawList = [];
  for (const id of entities) {
    const renderable = ecs.getComponent(id, 'DepthRenderable');
    if (!renderable || !renderable.visible || !renderable.drawFn) continue;

    const pos = ecs.getComponent(id, 'Position');
    if (!pos) continue;

    drawList.push({
      id,
      z: pos.z + (renderable.sortBias || 0),
      pos,
      renderable,
    });
  }

  // Sort far-to-near (painter's algorithm)
  drawList.sort((a, b) => a.z - b.z);

  // Render each entity
  for (const entry of drawList) {
    const pos = entry.pos;
    const scale = scaleAtDepth(pos.z);
    const screenY = groundY(pos.z);
    const screenX = pos.x - cameraX;

    ctx.save();
    ctx.translate(screenX, screenY);
    ctx.scale(scale, scale);

    // Translate up by jump height
    ctx.translate(0, -pos.jy);

    // Draw ground shadow at feet level (not affected by jy)
    const dim = ecs.getComponent(entry.id, 'Dimensions');
    if (dim) {
      // Undo jy translation for shadow, then reapply
      ctx.save();
      ctx.translate(0, pos.jy); // back to ground level
      drawShadow(ctx, 2, 15 + Math.max(0, 6 - pos.jy * 0.05));
      ctx.restore();
    }

    // Call the entity's custom draw function
    entry.renderable.drawFn(ctx, entry.id, ecs, scale);

    ctx.restore();
  }
}

/**
 * HudSystem — updates the HTML HUD elements from ECS data.
 * Phase: 'renderPost'
 */
function HudSystem(entities, ecs, dt) {
  for (const id of entities) {
    const health = ecs.getComponent(id, 'Health');
    if (!health) continue;

    // Update HP bar
    const hpFill = document.getElementById('hpFill');
    if (hpFill) {
      hpFill.style.width = Math.max(0, health.hp / health.maxHp * 100) + '%';
    }
  }
}

/**
 * DebugSystem — updates the debug info panel.
 * Phase: 'renderPost'
 */
function DebugSystem(entities, ecs, dt) {
  const info = ecs.debugInfo();
  const playerIds = ecs.query('PlayerTag', 'Position');
  let playerInfo = 'No player';

  if (playerIds.length > 0) {
    const pos = ecs.getComponent(playerIds[0], 'Position');
    const vel = ecs.getComponent(playerIds[0], 'Velocity');
    const health = ecs.getComponent(playerIds[0], 'Health');
    playerInfo = `Player #${playerIds[0]}  ` +
      `x:${Math.round(pos.x)} z:${Math.round(pos.z)} jy:${Math.round(pos.jy)}  ` +
      `vx:${Math.round(vel?.vx || 0)}  ` +
      `hp:${Math.round(health?.hp || 0)}/${health?.maxHp || 0}`;
  }

  const el = document.getElementById('debugInfo');
  if (el) {
    el.innerHTML =
      `BLADEFALL v${VERSION} · ECS · LittleJS<br>` +
      `Entities: ${info.entities} · Systems: ${info.systems.length}<br>` +
      `${playerInfo}<br>` +
      `cam: ${Math.round(cameraX)} · FPS: ${Math.round(1 / dt)}`;
  }
}


/* ================================================================
   SECTION 7: WORLD RENDERING (BACKGROUND & ENVIRONMENT)
   
   These functions draw the scrolling ground plane, parallax layers,
   and atmospheric effects. Called directly in the LittleJS gameRender
   hook BEFORE the ECS DepthRenderSystem runs.
   ================================================================ */

/**
 * Draw the sky gradient background.
 */
function drawSky(ctx) {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, VH);
  skyGrad.addColorStop(0, '#1a2233');
  skyGrad.addColorStop(1, '#070809');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, VW, VH);
}

/**
 * Draw parallax mountain/structure silhouettes behind the ground.
 */
function drawParallax(ctx) {
  // Far mountains (slow parallax)
  ctx.fillStyle = 'rgba(255,255,255,0.045)';
  for (let i = 0; i < 14; i++) {
    const px = (i * 260) - (cameraX * 0.4) % (14 * 260);
    const h = 90 + (i % 3) * 30;
    const w = 70;
    ctx.beginPath();
    ctx.moveTo(px, GROUND_FAR);
    ctx.lineTo(px + w * 0.45, GROUND_FAR - h);
    ctx.lineTo(px + w, GROUND_FAR);
    ctx.closePath();
    ctx.fill();
  }

  // Mid-ground structures (medium parallax)
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  for (let i = 0; i < 22; i++) {
    const px = (i * 180) - (cameraX * 0.65) % (22 * 180);
    ctx.fillRect(px, GROUND_FAR - 130, 24, 130);
  }
}

/**
 * Draw the walkable ground plane with depth guide lines.
 */
function drawGround(ctx) {
  const stageLen = 2000; // placeholder stage length

  ctx.save();
  ctx.translate(-cameraX, 0);

  // Ground fill with depth gradient
  const groundGrad = ctx.createLinearGradient(0, GROUND_FAR, 0, VH);
  groundGrad.addColorStop(0, lerpColor('#2a3340', '#000', 0.35));
  groundGrad.addColorStop(0.5, '#2a3340');
  groundGrad.addColorStop(1, lerpColor('#2a3340', '#000', 0.12));
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_FAR, stageLen, VH - GROUND_FAR + 40);

  // Horizon edge highlight
  ctx.fillStyle = 'rgba(255,255,255,0.09)';
  ctx.fillRect(0, GROUND_FAR, stageLen, 3);

  // Depth guide lines across the band
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let k = 1; k < 4; k++) {
    ctx.fillRect(0, groundY(k * DEPTH / 4), stageLen, 1.5);
  }

  // Ground texture ticks
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  const startTick = Math.floor(cameraX / 46) * 46;
  for (let x = startTick; x < cameraX + VW + 46; x += 46) {
    ctx.fillRect(x, groundY(DEPTH * 0.2), 2, 7);
    ctx.fillRect(x + 20, groundY(DEPTH * 0.72), 3, 10);
  }

  ctx.restore();
}

/**
 * Draw the stage banner overlay (shown at stage start).
 */
let stageBannerTimer = 2.6;

function drawStageBanner(ctx, dt) {
  if (stageBannerTimer <= 0) return;
  stageBannerTimer -= dt;

  const alpha = Math.min(1, stageBannerTimer) * Math.min(1, (2.6 - stageBannerTimer) * 3);
  ctx.save();
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = '900 26px -apple-system, sans-serif';
  ctx.fillText('THE OUTSKIRTS', VW / 2, VH * 0.34);
  ctx.fillStyle = '#e8a33d';
  ctx.font = '800 12px -apple-system, sans-serif';
  ctx.fillText('STAGE 1 / 14', VW / 2, VH * 0.34 + 22);
  ctx.restore();
}


/* ================================================================
   SECTION 8: ZzFX SOUND DEFINITIONS
   
   Procedural sound effects using LittleJS's built-in ZzFX engine.
   Each sound is defined as a parameter array — no audio files needed.
   
   Use https://zzfx.3d2k.com/ to design new sounds.
   ================================================================ */

// Sound definitions (will be expanded in future steps)
const SFX = {
  // Played in MovementSystem on jump
  jump:  [.03,,230,.01,.08,.13,1,.5,,,,,,,,,,.8,.04],
  // Played in PhysicsSystem on land
  land:  [.02,,150,.01,.04,.08,1,1.5,,6,-50,.01,,,,,,,.04],
  // Placeholder attack sound
  slash: [.04,,400,.01,.02,.08,2,2.5,,3,,,,,,,,.6,.02],
};


/* ================================================================
   SECTION 9: LITTLEJS ↔ ECS INTEGRATION
   
   This is the bridge between LittleJS's lifecycle and our ECS.
   LittleJS calls these functions every frame at 60fps:
   
     gameInit()       → Create the ECS world, register systems, spawn entities
     gameUpdate()     → Run ECS 'update' phase systems
     gameUpdatePost() → Flush ECS destroy queue, update camera
     gameRender()     → Draw world background, run ECS 'render' phase systems
     gameRenderPost() → Run ECS 'renderPost' phase systems (HUD, debug)
   ================================================================ */

/** The single global ECS instance */
let world;

/** The player entity ID (cached for quick access) */
let playerEntity;

/**
 * gameInit — called once when LittleJS starts.
 * Sets up the ECS world, registers all systems, and spawns the player.
 */
function gameInit() {
  // ── Configure LittleJS ──
  // Disable WebGL (we're doing all rendering via Canvas2D procedurally)
  // Note: glEnable must be set before engineInit, which we do below
  
  // ── Create the ECS world ──
  world = new EntityManager();

  // ── Register Systems (order matters within each phase!) ──

  // Update-phase systems (game logic)
  world.registerSystem('InputSystem',     ['InputReceiver'],                          InputSystem,     'update');
  world.registerSystem('MovementSystem',  ['InputReceiver', 'Velocity', 'Facing'],    MovementSystem,  'update');
  world.registerSystem('PhysicsSystem',   ['Position', 'Velocity'],                   PhysicsSystem,   'update');
  world.registerSystem('AnimationSystem', ['AnimationState'],                          AnimationSystem, 'update');
  world.registerSystem('CameraSystem',    ['CameraTarget', 'Position'],               CameraSystem,    'update');

  // Render-phase systems (world-space drawing)
  world.registerSystem('DepthRenderSystem', ['Position', 'DepthRenderable'],           DepthRenderSystem, 'render');

  // RenderPost-phase systems (HUD / overlays / debug)
  world.registerSystem('HudSystem',   ['PlayerTag', 'Health'],                         HudSystem,   'renderPost');
  world.registerSystem('DebugSystem', ['PlayerTag'],                                   DebugSystem, 'renderPost');

  // ── Spawn Player Entity ──
  playerEntity = world.createEntity();
  world.addComponent(playerEntity, 'Position',        Components.Position(120, DEPTH * 0.55, 0));
  world.addComponent(playerEntity, 'Velocity',        Components.Velocity());
  world.addComponent(playerEntity, 'Dimensions',      Components.Dimensions(26, 44));
  world.addComponent(playerEntity, 'PhysicsBody',     Components.PhysicsBody(1400, 0.85));
  world.addComponent(playerEntity, 'Facing',          Components.Facing(1));
  world.addComponent(playerEntity, 'AnimationState',  Components.AnimationState());
  world.addComponent(playerEntity, 'Health',          Components.Health(100, 100));
  world.addComponent(playerEntity, 'PlayerTag',       Components.PlayerTag());
  world.addComponent(playerEntity, 'InputReceiver',   Components.InputReceiver());
  world.addComponent(playerEntity, 'CameraTarget',    Components.CameraTarget());
  world.addComponent(playerEntity, 'DepthRenderable', Components.DepthRenderable(drawPlayer, true, 0));

  console.log('[BLADEFALL] ECS initialized.', world.debugInfo());
}

/**
 * gameUpdate — called every frame (60fps) before physics/objects.
 * This is where all game logic runs via the ECS update phase.
 */
function gameUpdate() {
  // LittleJS provides a fixed timestep; we use 1/60
  const dt = 1 / 60;

  // Run all ECS update-phase systems
  world.runSystems('update', dt);
}

/**
 * gameUpdatePost — called after physics/objects.
 * Used for cleanup and deferred operations.
 */
function gameUpdatePost() {
  // Flush any entities marked for destruction
  world.flushDestroyQueue();
}

/**
 * gameRender — called before objects are rendered.
 * Draws world background (sky, parallax, ground), then runs ECS render systems.
 */
function gameRender() {
  // Get the main 2D context (LittleJS exposes this globally)
  const ctx = mainContext;

  // Update viewport measurements
  recalcViewport();

  // Clear and draw world background
  drawSky(ctx);
  drawParallax(ctx);
  drawGround(ctx);

  // Run ECS render-phase systems (DepthRenderSystem draws entities)
  world.runSystems('render', 1 / 60);

  // Stage banner overlay
  drawStageBanner(ctx, 1 / 60);
}

/**
 * gameRenderPost — called after objects are rendered.
 * Draws HUD, overlays, and debug info via ECS renderPost systems.
 */
function gameRenderPost() {
  world.runSystems('renderPost', 1 / 60);
}


/* ================================================================
   SECTION 10: ENGINE BOOTSTRAP
   
   Start the LittleJS engine with our lifecycle hooks.
   LittleJS handles: requestAnimationFrame loop, canvas creation,
   input polling, and ZzFX audio context initialization.
   ================================================================ */

// Disable WebGL — we do all rendering via Canvas2D procedurally
glEnable = false;

// Disable the LittleJS tile system (we don't use sprite sheets)
// We pass no image sources to engineInit.

// Tell LittleJS not to show its default loading screen text
showSplashScreen = false;

// Initialize the LittleJS engine
// Parameters: gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost, imageSources, rootElement
engineInit(
  gameInit,
  gameUpdate,
  gameUpdatePost,
  gameRender,
  gameRenderPost,
  [],                                          // No image sources (all procedural)
  document.getElementById('gameContainer')     // Root element for canvas injection
);

/* ================================================================
   Debug Hook — expose ECS internals for headless testing.
   Compatible with the original Bladefall's window.__BF interface.
   ================================================================ */
window.__BF = {
  get world() { return world; },
  get playerEntity() { return playerEntity; },
  get version() { return VERSION; },
  Components,
  DEPTH,
  groundY,
  scaleAtDepth,
  get cameraX() { return cameraX; },
  snap() {
    if (!world || !playerEntity) return { error: 'not initialized' };
    const pos = world.getComponent(playerEntity, 'Position');
    const vel = world.getComponent(playerEntity, 'Velocity');
    const health = world.getComponent(playerEntity, 'Health');
    const info = world.debugInfo();
    return {
      version: VERSION,
      entities: info.entities,
      systems: info.systems,
      player: {
        x: Math.round(pos?.x || 0),
        z: Math.round(pos?.z || 0),
        jy: Math.round(pos?.jy || 0),
        vx: Math.round(vel?.vx || 0),
        hp: health?.hp,
        maxHp: health?.maxHp,
      },
      cam: Math.round(cameraX),
    };
  },
};
