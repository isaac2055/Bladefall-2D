<style>
:root{--bg:#0b0c10;--ink:#f3f1ea;--muted:#8b8f9a;--amber:#e8a33d;--amber-dim:#5a4422;--hp:#e8453d;--xp:#3a9dd0;--good:#3ad07f;--danger:#ff5e54;--panel:#15161c;--line:#2a2c36;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;touch-action:none;overscroll-behavior:none;position:fixed;width:100%;}
#gameContainer{position:absolute;inset:0;width:100%;height:100%;}
#hud{position:absolute;left:0;right:0;top:0;padding:calc(env(safe-area-inset-top)+8px) 12px 0;pointer-events:none;z-index:5;}
#hud.hide{display:none;}
.barwrap{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.barlabel{font-size:10px;font-weight:800;letter-spacing:.12em;width:26px;color:var(--muted);}
.bar{flex:1;height:12px;background:#0006;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.bar>i{display:block;height:100%;width:0;border-radius:8px;transition:width .12s linear;}
#hpFill{background:linear-gradient(90deg,#ff6a60,var(--hp));}
#xpFill{background:linear-gradient(90deg,#56b6e6,var(--xp));}
#hud .meta{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
#hud .left{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
#lvlBadge{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--amber);background:var(--amber-dim);padding:3px 8px;border-radius:999px;}
#weaponTag{font-size:11px;font-weight:700;color:var(--ink);opacity:.95;}
#armorTag{font-size:11px;font-weight:700;color:#aeb9c6;display:flex;align-items:center;gap:4px;}
#armorTag .pip{width:7px;height:7px;border-radius:2px;display:inline-block;background:#333;}
#stageTag{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
#bosshpwrap{position:absolute;left:50%;top:calc(env(safe-area-inset-top)+64px);transform:translateX(-50%);width:min(560px,86vw);display:none;z-index:5;pointer-events:none;}
#bosshpwrap.on{display:block;}
#bossname{text-align:center;font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--danger);margin-bottom:4px;text-shadow:0 1px 4px #000;}
#bosshp{height:10px;background:#0008;border:1px solid #6b1c18;border-radius:6px;overflow:hidden;}
#bosshp>i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ff7a52,#c9281f);}
.barwrap.map{margin-bottom:2px;}
.barwrap.map .barlabel{font-size:8.5px;}
.barwrap.map .bar{height:5px;}
#progFill{background:#8b8f9a;}
#controls{position:absolute;left:0;right:0;bottom:0;height:100%;pointer-events:none;z-index:6;}
#controls.hide{display:none;}
.btn{position:absolute;pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(28,30,38,.42);border:1.5px solid rgba(255,255,255,.14);color:#fff;font-weight:800;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);font-size:13px;letter-spacing:.04em;transition:transform .05s,background .08s;}
.btn.pressed{background:rgba(232,163,61,.55);border-color:#f3c272;transform:scale(.94);}
.btn svg{width:46%;height:46%;fill:currentColor;}
#joyzone{position:absolute;left:0;bottom:0;width:46%;height:46%;pointer-events:auto;}
#joy{position:absolute;width:104px;height:104px;border-radius:50%;background:rgba(28,30,38,.35);border:1.5px solid rgba(255,255,255,.12);display:none;pointer-events:none;}
#joyknob{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(232,163,61,.5);border:1.5px solid #f3c272;left:29px;top:29px;pointer-events:none;}
#bAttack{width:86px;height:86px;right:calc(env(safe-area-inset-right)+16px);bottom:calc(env(safe-area-inset-bottom)+26px);font-size:15px;background:rgba(232,69,61,.34);border-color:rgba(255,140,134,.4);}
#bAttack.pressed{background:rgba(232,69,61,.62);}
#bAttack.ranged{background:rgba(120,90,210,.34);border-color:rgba(170,150,240,.45);}
#bAttack.ranged.pressed{background:rgba(120,90,210,.62);}
#bJump{width:66px;height:66px;right:calc(env(safe-area-inset-right)+104px);bottom:calc(env(safe-area-inset-bottom)+92px);}
#bDodge{width:62px;height:62px;right:calc(env(safe-area-inset-right)+110px);bottom:calc(env(safe-area-inset-bottom)+18px);font-size:11px;background:rgba(58,157,208,.3);border-color:rgba(120,200,235,.4);}
#bDodge.pressed{background:rgba(58,157,208,.6);}
#bDodge.cooling{opacity:.4;}
#pausebtn{position:absolute;top:calc(env(safe-area-inset-top)+8px);right:12px;z-index:7;width:34px;height:34px;border-radius:9px;background:rgba(28,30,38,.5);border:1px solid var(--line);color:var(--ink);font-size:13px;display:flex;align-items:center;justify-content:center;pointer-events:auto;}
#pausebtn.hide{display:none;}
#overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(6,7,10,.82);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);text-align:center;overflow:auto;touch-action:pan-y;}
#overlay.hide{display:none;}
.card{width:100%;max-width:380px;}
.title{font-size:clamp(34px,11vw,52px);font-weight:900;letter-spacing:.04em;margin:0;background:linear-gradient(180deg,#f7d79a,var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 4px 24px rgba(232,163,61,.25);}
.subtitle{color:var(--muted);font-size:13px;letter-spacing:.22em;text-transform:uppercase;margin:6px 0 22px;}
.bigbtn{display:block;width:100%;padding:15px;margin:9px 0;border:none;border-radius:14px;font-size:16px;font-weight:800;letter-spacing:.02em;cursor:pointer;color:#0b0c10;background:var(--amber);}
.bigbtn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.bigbtn:active{transform:scale(.98);}
.ovh{font-size:24px;font-weight:900;margin:0 0 4px;letter-spacing:.02em;}
.ovsub{color:var(--muted);font-size:14px;margin:0 0 20px;line-height:1.5;}
.choices{display:flex;flex-direction:column;gap:12px;}
.choice{padding:14px 16px;border-radius:14px;background:var(--panel);border:1.5px solid var(--line);cursor:pointer;text-align:left;transition:border-color .1s,transform .05s;}
.choice:active{transform:scale(.985);}
.choice .cname{font-size:16px;font-weight:800;color:var(--amber);display:flex;align-items:center;gap:8px;}
.choice .cdesc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4;}
.statgrid{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:0 0 20px;}
.hint{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.6;}
.vsrow{display:flex;justify-content:space-between;gap:6px;font-size:12px;color:var(--muted);margin:3px 0;}
.vsrow b{color:var(--ink);}
.up{color:var(--good);}.down{color:var(--danger);}
#toast{position:absolute;left:50%;top:30%;transform:translateX(-50%);z-index:25;background:rgba(20,21,27,.92);border:1px solid var(--amber-dim);color:var(--amber);font-weight:800;font-size:13px;letter-spacing:.04em;padding:10px 18px;border-radius:12px;opacity:0;transition:opacity .2s,top .2s;pointer-events:none;text-align:center;max-width:80vw;}
#toast.show{opacity:1;top:24%;}
</style>

<script>
'use strict';
/* ================================================================
   BLADEFALL v5.1.0 — Step 2: Full Playable Game
   ECS architecture on LittleJS engine.
   ================================================================ */
const VERSION='5.2.0';

/* ================================================================
   SECTION 1: ENTITY-COMPONENT-SYSTEM
   ================================================================ */
class EntityManager{
  constructor(){this._nid=1;this._c=new Map;this._e=new Set;this._dq=[];this._sys=[];}
  createEntity(){const id=this._nid++;this._e.add(id);return id;}
  destroyEntity(id){this._dq.push(id);}
  entityExists(id){return this._e.has(id);}
  flush(){for(const id of this._dq){for(const[,s]of this._c)s.delete(id);this._e.delete(id);}this._dq.length=0;}
  add(eid,name,data){if(!this._c.has(name))this._c.set(name,new Map);this._c.get(name).set(eid,data);return data;}
  rem(eid,name){const s=this._c.get(name);return s?s.delete(eid):false;}
  get(eid,name){const s=this._c.get(name);return s?s.get(eid):undefined;}
  has(eid,name){const s=this._c.get(name);return s?s.has(eid):false;}
  store(name){return this._c.get(name)||new Map;}
  query(...names){
    if(!names.length)return[];
    let sn=names[0],ss=Infinity;
    for(const n of names){const s=this._c.get(n);const sz=s?s.size:0;if(sz<ss){ss=sz;sn=n;}}
    if(ss===0)return[];
    const sm=this._c.get(sn),r=[];
    for(const eid of sm.keys()){let ok=true;for(const n of names){if(n===sn)continue;const s=this._c.get(n);if(!s||!s.has(eid)){ok=false;break;}}if(ok)r.push(eid);}
    return r;
  }
  register(name,req,fn,phase='update'){this._sys.push({name,req,fn,phase});}
  run(phase,dt){for(const s of this._sys){if(s.phase!==phase)continue;s.fn(this.query(...s.req),this,dt);}}
  info(){const cc={};for(const[n,s]of this._c)cc[n]=s.size;return{entities:this._e.size,components:cc,systems:this._sys.length};}
}

/* ================================================================
   SECTION 2: GAME DATA — Rarity, Elements, Weapons, Armor, Stages, Enemies
   ================================================================ */
let VW=0,VH=0,GROUND_Y=0;
function recalcVP(){VW=mainCanvas.width;VH=mainCanvas.height;GROUND_Y=VH-Math.max(120,VH*0.20);}

/* Rarity */
const RARITY={common:{name:'Common',color:'#b9c0cc',base:1000,mul:1,tier:0},uncommon:{name:'Uncommon',color:'#5fd17a',base:300,mul:1.3,tier:1},rare:{name:'Rare',color:'#4aa3e0',base:80,mul:1.7,tier:2},epic:{name:'Epic',color:'#b06bff',base:16,mul:2.25,tier:3},legendary:{name:'Legendary',color:'#f0a93a',base:2.6,mul:3,tier:4}};
const RORDER=['common','uncommon','rare','epic','legendary'];
function rarGlow(r){return[0,3,6,10,15][RARITY[r].tier];}
function rollRarity(){
  const luck=(G.stageIndex*0.5)+(G.ngPlus*2.5)+(Math.floor(G.p.level/2)*0.2);
  const boost=1+Math.min(luck,22)*0.085;let pool=[],total=0;
  RORDER.forEach((r,i)=>{const w=RARITY[r].base*Math.pow(boost,i);pool.push(w);total+=w;});
  let roll=Math.random()*total;for(let i=0;i<pool.length;i++){roll-=pool[i];if(roll<=0)return RORDER[i];}return'common';
}

/* Elements */
const WEAK={fire:'ice',ice:'fire',poison:'holy',storm:'arcane',void:'holy',arcane:'storm',holy:'void'};
function elColor(el){return{fire:'#ff7a3a',ice:'#7fd6ff',poison:'#86e05a',arcane:'#c47bff',void:'#b06bff',storm:'#9fe0ff',holy:'#ffe9a8'}[el]||null;}
function elemMod(wEl,eEl){if(!wEl||!eEl)return 1;if(wEl==='void')return 1.15;if(wEl===eEl)return 0.6;if(WEAK[eEl]===wEl)return 1.5;return 1;}

/* Weapon archetypes */
const ARCH={
  sword:{disp:'Sword',cls:'melee',sch:'phys',dmg:11,cd:.38,kb:190,range:54,reach:30,art:'sword'},

  spear:{disp:'Spear',cls:'melee',sch:'phys',dmg:15,cd:.50,kb:230,range:88,reach:26,art:'spear'},
  axe:{disp:'Battle Axe',cls:'melee',sch:'phys',dmg:20,cd:.56,kb:300,range:58,reach:36,art:'axe'},
  great:{disp:'Greatsword',cls:'melee',sch:'phys',dmg:28,cd:.70,kb:340,range:66,reach:42,art:'great'},
  hammer:{disp:'Warhammer',cls:'melee',sch:'phys',dmg:34,cd:.82,kb:430,range:60,reach:44,art:'hammer'},
  scythe:{disp:'Scythe',cls:'melee',sch:'phys',dmg:22,cd:.52,kb:260,range:74,reach:40,art:'scythe'},
  flameblade:{disp:'Flameblade',cls:'melee',sch:'mag',dmg:16,cd:.40,kb:200,range:58,reach:32,art:'sword',el:'fire'},
  frostbrand:{disp:'Frostbrand',cls:'melee',sch:'mag',dmg:14,cd:.38,kb:200,range:58,reach:32,art:'sword',el:'ice'},
  runeblade:{disp:'Runeblade',cls:'melee',sch:'mag',dmg:21,cd:.42,kb:240,range:62,reach:34,art:'great',el:'arcane'},
  voidscythe:{disp:'Void Scythe',cls:'melee',sch:'mag',dmg:24,cd:.50,kb:260,range:76,reach:40,art:'scythe',el:'void',lifesteal:.12},
  bow:{disp:'Longbow',cls:'ranged',sch:'phys',dmg:9,cd:.30,kb:110,art:'bow',proj:{speed:680,size:5,pierce:0,range:1150,color:'#d8c27a',shape:'arrow'}},
  crossbow:{disp:'Crossbow',cls:'ranged',sch:'phys',dmg:16,cd:.50,kb:170,art:'cross',proj:{speed:780,size:6,pierce:1,range:900,color:'#cfd6df',shape:'arrow'}},
  knives:{disp:'Throwing Knives',cls:'ranged',sch:'phys',dmg:6,cd:.16,kb:80,art:'dagger',proj:{speed:640,size:4,pierce:0,range:1000,color:'#9fe6c8',shape:'arrow'}},
  firestaff:{disp:'Fire Staff',cls:'ranged',sch:'mag',dmg:20,cd:.54,kb:150,art:'staff',el:'fire',proj:{speed:470,size:10,pierce:0,range:360,color:'#ff7a3a',shape:'orb',glow:1}},
  frostwand:{disp:'Frost Wand',cls:'ranged',sch:'mag',dmg:11,cd:.32,kb:120,art:'wand',el:'ice',proj:{speed:560,size:7,pierce:0,range:520,color:'#7fd6ff',shape:'orb',glow:1}},
  stormrod:{disp:'Storm Rod',cls:'ranged',sch:'mag',dmg:16,cd:.40,kb:140,art:'rod',el:'storm',proj:{speed:740,size:6,pierce:1,range:780,color:'#9fe0ff',shape:'bolt',glow:1}},
  holyscepter:{disp:'Holy Scepter',cls:'ranged',sch:'mag',dmg:22,cd:.56,kb:160,art:'scepter',el:'holy',proj:{speed:560,size:9,pierce:1,range:560,color:'#ffe9a8',shape:'orb',glow:1}},
};
const ARCHIDS=Object.keys(ARCH);
function makeWeapon(aid,rid,nameO){const a=ARCH[aid],r=RARITY[rid];const w={arche:aid,art:a.art,cls:a.cls,sch:a.sch,el:a.el||null,rarity:rid,name:nameO||(r.name+' '+a.disp),dmg:+(a.dmg*r.mul).toFixed(1),cd:a.cd,kb:a.kb,lifesteal:(a.lifesteal||0)+(rid==='legendary'?0.05:0),color:r.color,blade:(a.sch==='mag'?(elColor(a.el)||'#c9a6ff'):'#dfe5ec')};if(a.cls==='melee'){w.range=a.range;w.reach=a.reach;}else{w.proj=Object.assign({},a.proj);}return w;}
function startWeapon(){const w=makeWeapon('sword','common','Rusty Sword');w.dmg=9;w.blade='#bcae8a';return w;}

/* Armor */
const SLOTS={helmet:{label:'Helmet',def:[6,10,15,21,28]},chest:{label:'Chestplate',def:[9,15,22,30,40]},legs:{label:'Leggings',def:[7,11,17,23,31]}};
const SLOTIDS=['helmet','chest','legs'];
function makeArmor(rid,slot){const r=RARITY[rid],tier=r.tier,sl=SLOTS[slot];
  const pool=[{stat:'hp',base:[10,16,22,30,40],f:v=>'+'+v+' Max HP'},{stat:'speedMul',base:[.04,.05,.07,.09,.11],f:v=>'+'+Math.round(v*100)+'% Speed'},{stat:'atkSpeedMul',base:[.03,.05,.06,.08,.10],f:v=>'+'+Math.round(v*100)+'% Atk Spd'},{stat:'lifesteal',base:[.02,.03,.04,.05,.07],f:v=>'+'+Math.round(v*100)+'% Lifesteal'},{stat:'dodgeMul',base:[.05,.07,.09,.11,.14],f:v=>'-'+Math.round(v*100)+'% Dodge CD'},{stat:'powerMul',base:[.04,.05,.07,.09,.11],f:v=>'+'+Math.round(v*100)+'% Damage'}];
  const n=tier>=3?2:1,chosen=[],p2=[...pool];for(let i=0;i<n;i++){const a=p2.splice(Math.floor(Math.random()*p2.length),1)[0];chosen.push({stat:a.stat,val:a.base[tier],label:a.f(a.base[tier])});}
  return{slot,rarity:rid,defense:sl.def[tier],color:r.color,name:r.name+' '+sl.label,affixes:chosen};
}

/* Stages */
const STAGES=[
  {name:'The Outskirts',len:3600,theme:'plains',sky:'#1a2233',ground:'#2a3340',grunts:3,flyers:0,type:'normal'},
  {name:'Black Woods',len:4200,theme:'forest',sky:'#13211a',ground:'#1d3026',grunts:2,flyers:2,mix:{toxling:1},type:'normal'},
  {name:'The Brute',len:3000,theme:'badlands',sky:'#241a1a',ground:'#33231f',grunts:1,flyers:1,type:'miniboss',boss:'brute'},
  {name:'Hollow Pass',len:2800,theme:'canyon',sky:'#241e16',ground:'#352a1e',grunts:2,flyers:1,mix:{sparkling:1},type:'normal'},
  {name:'Hollow Marksman',len:1800,theme:'canyon',sky:'#1f1a12',ground:'#312718',grunts:1,flyers:1,type:'miniboss',boss:'archer'},
  {name:'Ruined Keep',len:3200,theme:'ruins',sky:'#1c1830',ground:'#2a2440',grunts:2,flyers:2,mix:{shadeling:1,toxling:1},type:'normal'},

  {name:'Frostfell',len:3200,theme:'frost',sky:'#15202b',ground:'#243240',grunts:2,flyers:1,mix:{frostling:3},type:'normal'},
  {name:'Frost Sorcerer',len:2000,theme:'frost',sky:'#10202c',ground:'#1e3340',grunts:1,flyers:1,mix:{frostling:1},type:'miniboss',boss:'sorcerer'},
  {name:'Emberdeep',len:3200,theme:'volcano',sky:'#2a1410',ground:'#3a1c14',grunts:2,flyers:1,mix:{emberling:3},type:'normal'},
  {name:'Ember Colossus',len:2000,theme:'volcano',sky:'#2c130c',ground:'#3d1a10',grunts:1,flyers:1,mix:{emberling:1},type:'miniboss',boss:'colossus'},
  {name:'Abyss Approach',len:3600,theme:'void',sky:'#140b22',ground:'#241431',grunts:2,flyers:2,mix:{shadeling:2,sparkling:1},type:'normal'},
  {name:'Abyss King',len:2000,theme:'void',sky:'#120b1c',ground:'#241431',grunts:0,flyers:0,type:'boss',boss:'king'},
  {name:'The Void Tyrant',len:2000,theme:'apex',sky:'#0c0716',ground:'#1c1029',grunts:0,flyers:0,type:'boss',boss:'tyrant'}
];

/* Enemy archetypes */
const EARCH={
  grunt:{hp:22,dmg:8,speed:62,w:30,h:38,xp:13,color:'#7ec46a',kind:'walk'},
  flyer:{hp:16,dmg:7,speed:52,w:30,h:26,xp:15,color:'#d07ad0',kind:'fly'},
  emberling:{hp:24,dmg:9,speed:58,w:30,h:38,xp:17,color:'#ff7a3a',kind:'walk',element:'fire'},

function freshGear(){return{helmet:null,chest:null,legs:null};}
function recomputeArmor(p){const m={hp:0,speedMul:1,atkSpeedMul:1,lifesteal:0,dodgeMul:1,powerMul:1,defense:0};let total=0;
  if(p.gear)for(const slot of SLOTIDS){const a=p.gear[slot];if(!a)continue;total+=a.defense;for(const af of a.affixes){if(af.stat==='hp')m.hp+=af.val;else if(af.stat==='lifesteal')m.lifesteal+=af.val;else if(af.stat==='speedMul')m.speedMul*=1+af.val;else if(af.stat==='atkSpeedMul')m.atkSpeedMul*=1+af.val;else if(af.stat==='dodgeMul')m.dodgeMul*=1-af.val;else if(af.stat==='powerMul')m.powerMul*=1+af.val;}}
  m.defense=total/(total+200);p.armorMods=m;}
function effMaxHp(p){return p.maxHp+(p.armorMods?p.armorMods.hp:0);}
function effPower(p){return p.stats.power*(p.armorMods?p.armorMods.powerMul:1);}
function effAtkSpeed(p){return p.stats.atkSpeed*(p.armorMods?p.armorMods.atkSpeedMul:1);}
function effSpeed(p){return p.stats.speed*(p.armorMods?p.armorMods.speedMul:1);}
function effLifesteal(p){return p.stats.lifesteal+(p.armorMods?p.armorMods.lifesteal:0)+((p.weapon&&p.weapon.lifesteal)||0);}
function effDodgeCd(p){return p.stats.dodgeCd*(p.armorMods?p.armorMods.dodgeMul:1);}
function defenseR(p){return p.armorMods?Math.min(0.5,p.armorMods.defense):0;}
function totalDefense(p){let t=0;if(p.gear)for(const s of SLOTIDS){if(p.gear[s])t+=p.gear[s].defense;}return t;}
function bestGearRarity(p){let best=-1,bc='#333';if(p.gear)for(const s of SLOTIDS){const a=p.gear[s];if(a&&RARITY[a.rarity].tier>best){best=RARITY[a.rarity].tier;bc=a.color;}}return bc;}

const input={left:false,right:false,up:false,down:false,jump:false,attack:false,dodge:false,jumpEdge:false,dodgeEdge:false,jx:0,jz:0,pause:false};
const RAW_KEYS = {};

function moveX(){
  const L = RAW_KEYS['ArrowLeft'] || input.left;
  const R = RAW_KEYS['ArrowRight'] || input.right;
  return Math.max(-1,Math.min(1,input.jx+(R?1:0)-(L?1:0)));
}
function moveZ(){return Math.max(-1,Math.min(1,input.jz+(input.down?1:0)-(input.up?1:0)));}

/* Touch button binding */
function bindBtn(id,key){
  const el=document.getElementById(id);let heldId=null;
  const set=v=>{el.classList.toggle('pressed',v);
    if(key==='jump'){if(v&&!input.jump)input.jumpEdge=true;input.jump=v;}
    else if(key==='dodge'){if(v&&!input.dodge)input.dodgeEdge=true;input.dodge=v;}
    else input[key]=v;};
  el.addEventListener('pointerdown',e=>{if(heldId!==null)return;e.preventDefault();heldId=e.pointerId;set(true);el.setPointerCapture&&el.setPointerCapture(e.pointerId);});
  const rel=e=>{if(e.pointerId!==heldId)return;e.preventDefault&&e.preventDefault();heldId=null;set(false);};
  el.addEventListener('pointerup',rel);el.addEventListener('pointercancel',rel);el.addEventListener('lostpointercapture',rel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}

(function(){
  const zone=document.getElementById('joyzone'),joy=document.getElementById('joy'),knob=document.getElementById('joyknob');
  let pid=null,ox=0,oy=0;const R=46;
  function setKnob(dx,dy){knob.style.left=(29+dx)+'px';knob.style.top=(29+dy)+'px';}
  zone.addEventListener('pointerdown',e=>{if(pid!==null)return;e.preventDefault();pid=e.pointerId;ox=e.clientX;oy=e.clientY;
    joy.style.display='block';const zr=zone.getBoundingClientRect();joy.style.left=(ox-zr.left-52)+'px';joy.style.top=(oy-zr.top-52)+'px';setKnob(0,0);zone.setPointerCapture&&zone.setPointerCapture(e.pointerId);});
  zone.addEventListener('pointermove',e=>{if(e.pointerId!==pid)return;e.preventDefault();let dx=e.clientX-ox,dy=e.clientY-oy;const d=Math.sqrt(dx*dx+dy*dy);if(d>R){dx=dx/d*R;dy=dy/d*R;}setKnob(dx,dy);input.jx=dx/R;input.jz=dy/R;});
  const rel=e=>{if(e.pointerId!==pid)return;pid=null;joy.style.display='none';input.jx=0;input.jz=0;setKnob(0,0);};
  zone.addEventListener('pointerup',rel);zone.addEventListener('pointercancel',rel);zone.addEventListener('lostpointercapture',rel);
  zone.addEventListener('contextmenu',e=>e.preventDefault());
})();

function tint(a,b,t){const pa=hx(a),pb=hx(b);return'rgb('+Math.round(pa[0]+(pb[0]-pa[0])*t)+','+Math.round(pa[1]+(pb[1]-pa[1])*t)+','+Math.round(pa[2]+(pb[2]-pa[2])*t)+')';}
function hx(c){c=c.replace('#','');if(c.length===3)c=c.split('').map(x=>x+x).join('');return[parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)];}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function shadow(c,cy,w){c.save();c.globalAlpha=0.28;c.fillStyle='#000';c.beginPath();c.ellipse(0,cy,w,w*0.28,0,0,6.28);c.fill();c.restore();}
function lineC(c,a,b,cc,d){c.beginPath();c.moveTo(a,b);c.lineTo(cc,d);c.stroke();}
function triC(c,x1,y1,x2,y2,x3,y3){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.lineTo(x3,y3);c.closePath();c.fill();}
function eyes(c,cx,cy,dark,glow){c.fillStyle=glow||'#fff';c.beginPath();c.arc(cx-6,cy,3.4,0,6.28);c.arc(cx+6,cy,3.4,0,6.28);c.fill();c.fillStyle=dark||'#000';c.beginPath();c.arc(cx-5,cy,1.6,0,6.28);c.arc(cx+7,cy,1.6,0,6.28);c.fill();}

/* Weapon art */
function drawWeaponArt(c,w){
  const mag=w.sch==='mag',blade=w.blade||(mag?(elColor(w.el)||'#c9a6ff'):'#dfe5ec'),hilt='#6b5430';
  c.save();c.shadowColor=w.color||'#fff';c.shadowBlur=rarGlow(w.rarity);c.lineCap='round';c.lineJoin='round';
  switch(w.art){
    case'sword':c.strokeStyle=blade;c.lineWidth=5;lineC(c,0,0,28,0);c.strokeStyle='#9a8550';c.lineWidth=3;lineC(c,2,-5,2,5);break;
    case'dagger':c.strokeStyle=blade;c.lineWidth=4;lineC(c,0,0,16,0);break;
    case'spear':c.strokeStyle=hilt;c.lineWidth=3;lineC(c,0,0,30,0);c.fillStyle=blade;triC(c,30,-4,42,0,30,4);break;
    case'axe':c.strokeStyle=hilt;c.lineWidth=4;lineC(c,0,0,20,0);c.fillStyle=blade;c.beginPath();c.moveTo(18,-2);c.quadraticCurveTo(32,-12,34,0);c.quadraticCurveTo(32,12,18,2);c.closePath();c.fill();break;
    case'great':c.strokeStyle=blade;c.lineWidth=8;lineC(c,0,0,34,0);c.strokeStyle='#9a8550';c.lineWidth=3;lineC(c,2,-7,2,7);break;
    case'hammer':c.strokeStyle=hilt;c.lineWidth=4;lineC(c,0,0,22,0);c.fillStyle=blade;c.fillRect(18,-8,12,16);break;
    case'scythe':c.strokeStyle=hilt;c.lineWidth=3;lineC(c,0,0,30,0);c.strokeStyle=blade;c.lineWidth=5;c.beginPath();c.arc(30,-6,12,-0.2,1.9);c.stroke();break;
    case'bow':c.strokeStyle=blade;c.lineWidth=3;c.beginPath();c.arc(4,0,14,-1.3,1.3);c.stroke();c.strokeStyle='#eee';c.lineWidth=1;lineC(c,4+14*Math.cos(-1.3),14*Math.sin(-1.3),4+14*Math.cos(1.3),14*Math.sin(1.3));break;
    case'cross':c.strokeStyle=hilt;c.lineWidth=4;lineC(c,0,0,18,0);c.strokeStyle=blade;c.lineWidth=3;lineC(c,12,-9,12,9);break;
    default:{const len=w.art==='wand'?16:28;c.strokeStyle=hilt;c.lineWidth=3;lineC(c,0,0,len,0);c.fillStyle=blade;c.beginPath();c.arc(len,0,w.art==='wand'?4:6,0,6.28);c.fill();break;}
  }
  c.restore();c.shadowBlur=0;
}

/* Draw Player (Knight) */
function drawHero(c,p){
  const t=G.time,moving=Math.abs(p.vx)>20&&p.onGround;
  const legA=Math.sin(p.runAnim||0)*(moving?7:0);
  const bob=moving?Math.sin((p.runAnim||0)*2)*1.0:Math.sin(t*2)*0.6;
  const A='#3f566f',AL='#5d7da0',TR='#cfe0ef',CAPE='#28384e',MET='#aeb9c6',GL='#9fc4ff',TONE='#f1d9c2';
  const hurt=p.hurtFlash>0;
  c.save();
  if(p.invuln>0&&Math.floor(p.invuln*20)%2===0)c.globalAlpha=0.45;
  if(p.dodgeTimer>0)c.globalAlpha=0.6;
  c.scale(p.face,1);
  // Cape
  const sway=Math.sin(t*4)*3+(moving?6:0)-(p.vx||0)*0.02;
  c.save();c.translate(-5,-30+bob);c.fillStyle=hurt?'#5a2020':CAPE;
  c.beginPath();c.moveTo(2,-6);c.quadraticCurveTo(-13-sway,8,-10-sway,24);c.lineTo(-1,22);c.quadraticCurveTo(-3,4,5,-2);c.closePath();c.fill();c.restore();
  // Legs
  c.fillStyle='#1c2530';rr(c,-8,-14,7,14+legA,2);c.fill();rr(c,2,-14,7,14-legA,2);c.fill();
  c.fillStyle=MET;c.fillRect(-8,-3,7,3);c.fillRect(2,-3,7,3);
  c.save();c.translate(0,bob);
  // Body
  c.fillStyle=hurt?'#8a3030':A;rr(c,-10,-35,20,24,4);c.fill();
  c.fillStyle=hurt?'#b04040':AL;rr(c,-8,-34,16,11,3);c.fill();
  c.fillStyle=GL;c.globalAlpha=0.9;c.fillRect(-1.5,-33,3,17);c.globalAlpha=1;
  c.fillStyle=TR;c.fillRect(-10,-18,20,2.5);
  c.fillStyle=AL;c.beginPath();c.arc(-9,-33,5,0,6.28);c.fill();c.beginPath();c.arc(9,-33,5,0,6.28);c.fill();
  c.fillStyle=TR;c.beginPath();c.arc(-9,-33,2,0,6.28);c.fill();c.beginPath();c.arc(9,-33,2,0,6.28);c.fill();
  // Head
  c.fillStyle=TONE;rr(c,-6,-47,12,12,3);c.fill();
  c.fillStyle=hurt?'#8a3030':A;c.beginPath();c.moveTo(-7,-46);c.lineTo(7,-46);c.lineTo(7,-40);c.lineTo(3,-40);c.lineTo(3,-43);c.lineTo(-3,-43);c.lineTo(-3,-40);c.lineTo(-7,-40);c.closePath();c.fill();
  c.fillStyle=AL;c.fillRect(-7,-49,14,4);
  c.fillStyle=GL;c.fillRect(-3.2,-42,2.6,2);c.fillRect(1,-42,2.6,2);
  c.fillStyle=GL;c.beginPath();c.moveTo(0,-53);c.quadraticCurveTo(9,-53,6,-44);c.quadraticCurveTo(2,-48,-0.5,-49);c.closePath();c.fill();
  c.restore();
  // Arm + Weapon
  const w=p.weapon;
  c.save();c.translate(6,-30+bob);
  let ang;if(w.cls==='melee'){const swp=p.atkTimer>0?(1-(p.atkTimer/0.26)):0;ang=p.atkTimer>0?(-1.2+swp*2.5):-0.45+Math.sin(t*2)*0.05;}
  else{const rec=p.atkTimer>0?(p.atkTimer/0.18):0;ang=-0.1+rec*0.5;}
  c.rotate(ang);c.strokeStyle=AL;c.lineWidth=5;c.lineCap='round';lineC(c,-2,0,8,2);
  c.translate(8,2);drawWeaponArt(c,w);
  if(w.cls==='ranged'&&p.atkTimer>0){c.globalAlpha=0.8*(p.atkTimer/0.18);c.fillStyle=elColor(w.el)||'#fff';c.beginPath();c.arc(6,0,5,0,6.28);c.fill();c.globalAlpha=1;}
  c.restore();
  // Melee arc effect
  if(w.cls==='melee'&&p.atkTimer>0){const swp=1-(p.atkTimer/0.26);if(swp<0.7){c.save();c.translate(6,-30+bob);c.globalAlpha=0.22*(1-swp);c.strokeStyle='#fff';c.lineWidth=5;c.beginPath();c.arc(0,0,(w.range||50)*0.7,-1.2,1.2);c.stroke();c.restore();c.globalAlpha=1;}}
  c.restore();
}

  c.beginPath();c.moveTo(2,-e.h/2);c.quadraticCurveTo(e.w*0.8,-e.h/2-flap,e.w*0.55,-e.h/2+8);c.quadraticCurveTo(e.w*0.5,-e.h/2,2,-e.h/2+3);c.fill();
  c.fillStyle=col;c.beginPath();c.ellipse(0,-e.h/2,e.w*0.32,e.h*0.5,0,0,6.28);c.fill();

/* Draw Boss */
function drawBoss(c,e,col){
  const t=G.time,H=e.h,W=e.w,en=e.lunge>0||e.phase>=2;
  c.save();c.globalAlpha=0.2+0.07*Math.sin(t*5);c.fillStyle=col;c.beginPath();c.ellipse(0,-H*0.5,W*0.8,H*0.66,0,0,6.28);c.fill();c.restore();
  c.fillStyle=col;rr(c,-W/2,-H,W,H,10);c.fill();
  c.fillStyle='rgba(255,255,255,0.10)';rr(c,-W/2,-H,W,H*0.42,10);c.fill();
  c.fillStyle=tint(col,'#000',0.3);c.fillRect(-W/2,-H*0.52,W,3);c.fillRect(-W/2,-H*0.26,W,2);
  c.fillStyle=tint(col,'#000',0.22);c.fillRect(-2,-H,4,H);

  eyes(c,0,-H*0.74,'#400',eyeGlow);
}

  const p=freshPlayer();p.stats=Object.assign(p.stats,snap.stats);

  p.gear=cloneGear(snap.gear);p.maxHp=snap.maxHp||100;p.maxJumps=snap.maxJumps||2;p.hasSlam=!!snap.hasSlam;p.level=snap.level||1;

function computeNgScales(p){
  const off=Math.pow(Math.max(1,(p.weapon.dmg*effPower(p)*effAtkSpeed(p)/Math.max(.14,p.weapon.cd))/(9/.4)),0.85);
  const tuf=Math.pow(Math.max(1,(effMaxHp(p)/100)/(1-defenseR(p))),0.85);
  return{hp:Math.min(500,Math.max(off*1.05,(meta.lastNgHp||1)*1.08)),dmg:Math.min(500,Math.max(tuf*1.05,(meta.lastNgDmg||1)*1.08))};
}

function buildCustomLevel(i,s){
  const L=LEVELS[i];
  G.levelLength=L.len;
  for(const raw of L.objects){
    const o=Object.assign({},raw);
    if(o.type==='sign'&&o.y===-999)continue; // spacer
    G.obstacles.push(o);
  }
  G.obstacles.push({type:'pit',x:L.len/2,w:L.len+2000});
  G.levers={};
  for(const o of G.obstacles)if(o.type==='lever')G.levers[o.id]=o;
  if(L.loot)for(const l of L.loot){
    if(l.kind==='jetpack'){G.pickups.push({x:l.x,y:l.y,jetpack:true,bob:0});continue;}
    const rid=rollRarity();
    if(l.kind==='weapon'){const pool=ARCHIDS.filter(a=>a!=='sword');G.pickups.push({x:l.x,y:l.y,weapon:makeWeapon(pool[Math.floor(Math.random()*pool.length)],rid),bob:0});}
    else G.pickups.push({x:l.x,y:l.y,armor:makeArmor(rid,SLOTIDS[Math.floor(Math.random()*3)]),bob:0});
  }
  if(L.enemies)for(const en of L.enemies){const e=spawnEnemy(en.t,en.x);e.y=en.y||0;G.killGoal++;}
  if(s.boss){const e=spawnEnemy(s.boss,L.len-350,true);e.y=0;G.killGoal++;G.portal=null;}
  else G.portal={x:L.portal,t:0};
}

/* Stage loading */
function loadStage(i){
  const s=STAGES[i];G.stageIndex=i;
  G.enemies=[];G.pickups=[];G.projectiles=[];G.obstacles=[];G.aoes=[];G.portal=null;G.boss=null;
  G.kills=0;G.killGoal=0;G.cam=0;G.tookDamage=false;G.combo=0;G.comboT=0;
  G.p.x=70;G.p.y=0;G.p.vx=0;G.p.vy=0;G.p.onGround=true;
  G.p.ckX=70;G.p.ckY=0;G.p.ckSet=false;G.p.floorPlat=null;G.p.jumpCutOk=false;G.camY=0;

  if(i<LEVELS.length){
    buildCustomLevel(i,s);
    G.stageBanner=2.6;document.getElementById('bosshpwrap').classList.remove('on');
    document.getElementById('stageTag').textContent=s.name;hudUpdate();
    return;
  }

  const TILE_W=120, TILE_H=40;
  let curX=200;
  
  // Start safe
  G.obstacles.push({type:'plat', x:200, w:400, y:0, h:20});
  curX=400;

  while(curX < s.len-600){
    const chunk = CHUNKS[Math.floor(Math.random()*CHUNKS.length)];
    const rows = chunk.length, cols = chunk[0].length;
    const spots = [];
    
    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        if(chunk[r][c]==='X'){
           const px = curX + c*TILE_W + TILE_W/2;
           const py = (rows - 1 - r) * TILE_H;
           G.obstacles.push({type:'plat', x:px, w:TILE_W, y:py, h:20});
           spots.push({x:px, y:py});
        }
      }
    }
    
    if(spots.length>0 && Math.random()<0.35){
      const sp = spots[Math.floor(Math.random()*spots.length)];
      const rid = rollRarity();
      if(Math.random()<0.5){
        const pool=ARCHIDS.filter(a=>a!=='sword');
        G.pickups.push({x:sp.x, y:sp.y+10, weapon:makeWeapon(pool[Math.floor(Math.random()*pool.length)],rid), bob:0});
      }else{
        G.pickups.push({x:sp.x, y:sp.y+10, armor:makeArmor(rid,SLOTIDS[Math.floor(Math.random()*3)]), bob:0});
      }
    }
    curX += cols*TILE_W;
  }
  
  // End ground and Portal
  G.levelLength = curX + 600;
  G.obstacles.push({type:'plat', x:curX+300, w:600, y:0, h:20});
  G.obstacles.push({type:'pit', x:G.levelLength/2, w:G.levelLength+2000});
  G.portal = s.boss ? null : {x: curX+300, t:0};
  
  G.stageBanner=2.6;document.getElementById('bosshpwrap').classList.remove('on');

  const place=(type,count)=>{
      for(let k=0;k<count;k++){
          const valid = G.obstacles.filter(o => o.type==='plat');
          const p = valid[Math.floor(Math.random()*valid.length)];
          if(p){
              const e = spawnEnemy(type, p.x);
              e.y = p.y; G.killGoal++;
          }
      }
  };
  place('grunt',s.grunts||0);place('flyer',s.flyers||0);
  if(s.mix)for(const t in s.mix)place(t,s.mix[t]);
  if(s.type==='miniboss'||s.type==='boss'){
    const bp = G.obstacles[G.obstacles.length-2];
    const e = spawnEnemy(s.boss, bp.x - 100, true);
    e.y = bp.y; G.killGoal++;
  }
  document.getElementById('stageTag').textContent=s.name;hudUpdate();
}

/* Combat */
function hurtPlayer(dmg,dir,isBoss){
  const p=G.p;if(p.invuln>0||p.dodgeTimer>0||p.dead)return;
  if(!isBoss){
    if(p.ckSet){p.x=p.ckX;p.y=(p.ckY||0)+40;}
    else{p.x=p.safeX||200;p.y=200;}
    p.vy=0; p.slamming=false; p.floorPlat=null;
    G.shake=Math.min(G.shake+4,10);
    p.hurtFlash=0.18; p.invuln=0.5;
    if(meta.soundOn)SFX.hurt();
    return;
  }
  const actual=dmg*(1-defenseR(p));
  p.hp-=actual;p.hurtFlash=0.18;p.invuln=0.5;
  p.vx=dir*260;p.vy=-120;
  G.shake=Math.min(G.shake+6,12);G.tookDamage=true;
  if(meta.soundOn)SFX.hurt();
  if(p.hp<=0){p.hp=0;p.dead=true;die();}
}
function hitEnemy(e,dmg,dir,kb,ls,el){
  if(e.dead)return;
  const mod=elemMod(el,e.element);
  const actual=dmg*mod;e.hp-=actual;e.hitFlash=0.12;
  e.vx=dir*(kb||150);e.hurtKb=0.15;
  if(ls>0){const heal=actual*ls;G.p.hp=Math.min(G.p.hp+heal,effMaxHp(G.p));}
  G.shake=Math.min(G.shake+3,10);G.combo++;G.comboT=2;
  if(meta.soundOn)SFX.hit();
  addText(e.x,GROUND_Y-e.y-e.h-10,Math.round(actual).toString(),mod>1?'#ff6':mod<1?'#88f':'#fff',false);
  if(e.hp<=0){killEnemy(e);}
}
function killEnemy(e){
  e.dead=true;meta.totalKills++;G.kills++;
  if(e.boss){meta.bossKills++;if(e.type==='king')meta.kingKills++;if(e.type==='tyrant')meta.tyrantKills++;
    if(G.p.weapon.sch==='mag')meta.magicBossKills++;if(G.p.weapon.cls==='ranged')meta.rangedBossKills++;}
  if(meta.soundOn)SFX.enemyDie();
  // XP
  const xpGain=e.xp;G.p.xp+=xpGain;addText(e.x,GROUND_Y-e.y-e.h-26,'+'+xpGain+' XP','#3a9dd0',false);
  while(G.p.xp>=G.p.xpNext){G.p.xp-=G.p.xpNext;G.p.level++;G.p.xpNext=Math.round(46+G.p.level*34+G.p.level*G.p.level*2);
    meta.maxLevel=Math.max(meta.maxLevel,G.p.level);queueLevelUp++;if(meta.soundOn)SFX.levelup();}
  // Particles
  for(let i=0;i<12;i++){G.particles.push({x:e.x,y:GROUND_Y-e.y-e.h*0.5,vx:(Math.random()-0.5)*260,vy:-Math.random()*300,sz:3+Math.random()*4,color:e.color,life:0.6+Math.random()*0.3});}
  // Loot drop
  rollDrop(e);
  // Boss bar
  if(e.boss){
    document.getElementById('bosshpwrap').classList.remove('on');
    G.portal = {x: G.levelLength - 300, t:0};
  }
  persist();
}
function rollDrop(e){
  const dropChance=e.boss?1.0:0.16+G.stageIndex*0.01;
  if(Math.random()>dropChance)return;
  const rid=rollRarity();if(rid==='legendary'){meta.legendaryFound++;}
  if(Math.random()<0.45){// weapon
    const pool=ARCHIDS.filter(a=>a!=='sword');
    const aid=pool[Math.floor(Math.random()*pool.length)];
    G.pickups.push({x:e.x,y:e.y,weapon:makeWeapon(aid,rid),bob:0});
  }else{// armor
    const slot=SLOTIDS[Math.floor(Math.random()*3)];
    G.pickups.push({x:e.x,y:e.y,armor:makeArmor(rid,slot),bob:0});
  }
}

/* Floating text & particles */
function addText(x,y,txt,color,big){G.texts.push({x,y,txt,color,big:!!big,vy:-40,life:1.2});}

/* ================================================================
   SECTION 9: UPDATE LOOP
   ================================================================ */
function gateOpen(o){const lv=G.levers&&G.levers[o.gate];return lv&&lv.timer>0;}
function spikesUp(o){const t=((G.time+o.phase)%o.period+o.period)%o.period;return t<o.upT;}
function spikesWarn(o){const t=((G.time+o.phase)%o.period+o.period)%o.period;return t>o.period-0.4;}
function platTop(o){
  if(o.type==='plat'){
    if(o.gone)return null;
    if(o.gate&&!gateOpen(o))return null;
    return o.y;
  }
  if(o.type==='trap'&&o.state==='landed')return o.y+o.h;
  return null;
}
function getFloor(x, oldY = 0) {
  let fy=-200,fo=null;
  if(G&&G.obstacles) {
    for(const o of G.obstacles) {
      const top=platTop(o);
      if(top===null||Math.abs(x-o.x)>=o.w/2)continue;
      if(oldY>=top-4&&(fo===null||top>fy)){fy=top;fo=o;}
    }
  }
  return {y:fo?fy:-200,o:fo};
}
function getFloorY(x, oldY = 0){return getFloor(x,oldY).y;}
function pullLever(o){
  if(o.timer>0.5&&o.dur-o.timer<0.4)return; // debounce rapid re-hits
  o.timer=o.dur;o.flip=0.3;
  addText(o.x,GROUND_Y-o.y-80,'THE WAY OPENS!','#5fd17a',true);
  G.shake=Math.min(G.shake+4,10);
  if(meta.soundOn)SFX.pickup();
}
function triggerFake(o){
  o.gone=true;o.respawn=4;
  addText(o.x,GROUND_Y-o.y-30,'!','#ff5e54',true);
  for(let i=0;i<14;i++)G.particles.push({x:o.x+(Math.random()-0.5)*o.w,y:GROUND_Y-o.y,vx:(Math.random()-0.5)*220,vy:-Math.random()*160,sz:3+Math.random()*4,color:'#3a4250',life:0.5+Math.random()*0.3});
  if(meta.soundOn)SFX.enemyDie();
}

/* Per-frame update for interactive level objects */
function updateObstacles(dt){
  const p=G.p;
  for(const o of G.obstacles){
    if(o.type==='plat'){
      // movers
      if(o.move){
        const w=6.2832/o.move.period,t=G.time*w+(o.move.phase||0);
        const nx=o.x0+Math.sin(t)*o.move.dx,ny=o.y0+Math.sin(t)*o.move.dy;
        o.dxf=nx-o.x;o.dyf=ny-o.y;o.x=nx;o.y=ny;
      }
      // crumble lifecycle
      if(o.crT>0){o.crT-=dt;if(o.crT<=0){o.gone=true;o.fall=0;o.respawn=3.2;
        for(let i=0;i<10;i++)G.particles.push({x:o.x+(Math.random()-0.5)*o.w,y:GROUND_Y-o.y,vx:(Math.random()-0.5)*180,vy:Math.random()*80,sz:3+Math.random()*3,color:'#515b6d',life:0.5});
        if(meta.soundOn)SFX.land();}}
      if(o.gone){o.fall=(o.fall||0)+300*dt;o.respawn-=dt;if(o.respawn<=0){o.gone=false;o.fall=0;o.crT=0;}}
    }
    else if(o.type==='lever'){if(o.timer>0)o.timer-=dt;if(o.flip>0)o.flip-=dt;}
    else if(o.type==='spring'){if(o.anim>0)o.anim-=dt;}
    else if(o.type==='trap'){
      if(o.state==='idle'&&Math.abs(p.x-o.x)<58&&p.y<o.y){o.state='warn';o.warnT=0.3;if(meta.soundOn)SFX.land();}
      else if(o.state==='warn'){o.warnT-=dt;if(o.warnT<=0){o.state='falling';o.vy=0;}}
      else if(o.state==='falling'){
        o.vy+=2600*dt;o.y-=o.vy*dt;
        // crush check while falling
        if(p.invuln<=0&&Math.abs(p.x-o.x)<(o.w/2+p.w/2-4)&&p.y<o.y+o.h&&p.y+p.h>o.y)hurtPlayer(22,Math.sign(p.x-o.x)||1,false);
        if(o.y<=0){o.y=0;o.state='landed';G.shake=Math.min(G.shake+7,12);if(meta.soundOn)SFX.hit();
          for(let i=0;i<12;i++)G.particles.push({x:o.x+(Math.random()-0.5)*o.w,y:GROUND_Y,vx:(Math.random()-0.5)*280,vy:-Math.random()*220,sz:3+Math.random()*4,color:'#6b5b4a',life:0.5});}
      }
    }
  }
}

function update(dt){
  if(mode!=='play'||!G)return;
  G.time+=dt;G.shake*=0.88;if(G.stageBanner>0)G.stageBanner-=dt;
  if(G.comboT>0){G.comboT-=dt;if(G.comboT<=0)G.combo=0;}

  const p=G.p,s=STAGES[G.stageIndex];
  // Interactive level objects (movers, crumble, traps, levers, springs)
  updateObstacles(dt);
  // Ride moving platforms
  if(p.onGround&&p.floorPlat&&p.floorPlat.move){p.x+=p.floorPlat.dxf||0;p.y=p.floorPlat.y;}
  // Keyboard input
  if(keyIsDown('ArrowLeft'))input.left=true;else input.left=false;
  if(keyIsDown('ArrowRight'))input.right=true;else input.right=false;
  if(keyIsDown('ArrowUp'))input.up=true;else input.up=false;
  if(keyIsDown('ArrowDown'))input.down=true;else input.down=false;
  if(keyWasPressed('KeyW')||meta.autoAttack)input.attack=true;// attack tap
  if(keyWasPressed('Space')||keyWasPressed('ArrowUp'))input.jumpEdge=true;
  if(keyWasPressed('KeyD'))input.dodgeEdge=true;
  if(keyWasPressed('Escape'))openPause();

  const mx=moveX();
  const spd=200*effSpeed(p);

  // Dodge
  if(p.dodgeCdT>0)p.dodgeCdT-=dt;
  if(p.dodgeCdT<=0 && p.dashCharges<p.maxDashes){
    p.dashCharges++;
    if(p.dashCharges<p.maxDashes) p.dodgeCdT=effDodgeCd(p);
  }
  if(input.dodgeEdge&&p.dashCharges>0&&p.dodgeTimer<=0){
    p.dashCharges--;
    p.dodgeTimer=0.22;
    if(p.dodgeCdT<=0) p.dodgeCdT=effDodgeCd(p);
    p.dashX=mx||p.face;
    if(meta.soundOn)SFX.dodge();
  }
  input.dodgeEdge=false;
  if(p.dodgeTimer>0){
    p.dodgeTimer-=dt;
    const targetVx = mx ? mx*spd*3.0 : p.dashX*spd*2.4;
    p.vx += (targetVx - p.vx) * 15 * dt;
  } else {
    const targetVx = mx * spd;
    let friction = 15;
    if (mx === 0) friction = p.onGround ? 12 : 1.5; // coast in air!
    else if (Math.sign(mx) !== Math.sign(p.vx) && Math.abs(p.vx) > 20) friction = p.onGround ? 25 : 8; // turn around
    p.vx += (targetVx - p.vx) * friction * dt;
  }

  // Jump — buffered, with coyote time & variable height
  if(input.jumpEdge){p.jumpBuf=0.12;input.jumpEdge=false;}
  if(p.jumpBuf>0)p.jumpBuf-=dt;
  if(p.onGround)p.coyote=0.1;
  else{p.coyote-=dt;if(p.jumps===0&&p.coyote<=0)p.jumps=1;}
  if(p.jumpBuf>0&&p.jumps<p.maxJumps){
    p.jumpBuf=0;p.vy=-480;p.jumps++;p.onGround=false;p.floorPlat=null;p.jumpCutOk=true;
    if(meta.soundOn)SFX.jump();
  }
  const heldJump=input.jump||RAW_KEYS['Space']||RAW_KEYS['ArrowUp'];
  if(!heldJump&&p.jumpCutOk&&p.vy<-170)p.vy=-170; // release early = shorter hop (springs exempt)

  if(p.hasJetpack){
    if(p.onGround) p.fuel=100;
    else if(heldJump && p.fuel>0 && p.vy>-100 && !p.slamming) {
      p.vy -= 1800 * dt; 
      p.fuel -= 45 * dt; 
      if(p.vy < -300) p.vy = -300; 
      if(Math.random()<0.4) G.particles.push({x:p.x, y:GROUND_Y-p.y, vx:(Math.random()-0.5)*40, vy:100+Math.random()*150, sz:4+Math.random()*3, color:'#ff5500', life:0.4});
    }
  }

  // Ground Slam
  if(p.hasSlam && !p.onGround && input.down) {
      p.vy = 1400; // fast fall
      p.slamming = true;
  }

  // Movement & Collision
  p.x+=p.vx*dt;
  if(p.x<20)p.x=20;if(p.x>G.levelLength-20)p.x=G.levelLength-20;

  // Gravity
  const oldY = p.y;
  p.vy+=1400*dt;p.y-=p.vy*dt;

  // Springs — catch the player on the way down
  if(p.vy>0)for(const o of G.obstacles){
    if(o.type!=='spring')continue;
    if(Math.abs(p.x-o.x)<32&&oldY>=o.y-2&&p.y<=o.y+8){
      p.y=o.y;p.vy=-o.pow;p.jumps=1;p.onGround=false;p.floorPlat=null;p.jumpCutOk=false;o.anim=0.3;
      if(meta.soundOn)SFX.jump();
      for(let i=0;i<8;i++)G.particles.push({x:o.x+(Math.random()-0.5)*24,y:GROUND_Y-o.y,vx:(Math.random()-0.5)*160,vy:-Math.random()*260,sz:2+Math.random()*3,color:'#e8a33d',life:0.4});
      break;
    }
  }

  let fl=getFloor(p.x, oldY);
  if(fl.o&&fl.o.fake&&p.vy>0&&p.y<=fl.y){triggerFake(fl.o);fl=getFloor(p.x,oldY);} // cat mario says hi
  const targetFloor=fl.y;
  if(p.y<=targetFloor && p.vy > 0){
      p.y=targetFloor;
      if(!p.onGround&&meta.soundOn&&targetFloor>=0)SFX.land();
      if(p.slamming && targetFloor>=0) {
          p.slamming=false;
          G.aoes.push({x:p.x, y:p.y, r:120, fromPlayer:true, dmg:35*effPower(p), color:'#ff5500'});
          G.shake=8; if(meta.soundOn)SFX.hit();
      }
      p.onGround=true;p.vy=0;p.jumps=0;p.floorPlat=fl.o;
      if(fl.o&&fl.o.crumble&&!fl.o.crT&&!fl.o.gone)fl.o.crT=0.45;
  }
  if(p.y>targetFloor){p.onGround=false;p.floorPlat=null;}

  if(p.onGround && targetFloor >= 0) p.safeX = p.x;

  // Timed floor spikes
  if(p.invuln<=0&&p.dodgeTimer<=0)for(const o of G.obstacles){
    if(o.type!=='spikes'||!spikesUp(o))continue;
    if(Math.abs(p.x-o.x)<(o.w/2+p.w/2-8)&&p.y>o.y-8&&p.y<o.y+30)hurtPlayer(o.dmg,Math.sign(p.x-o.x)||1,false);
  }
  // Checkpoints
  for(const o of G.obstacles){
    if(o.type!=='check'||o.active)continue;
    if(Math.abs(p.x-o.x)<34&&Math.abs(p.y-o.y)<60){
      o.active=1;p.ckX=o.x;p.ckY=o.y;p.ckSet=true;
      p.hp=Math.min(effMaxHp(p),p.hp+20);
      addText(o.x,GROUND_Y-o.y-70,'CHECKPOINT','#5fd17a',false);
      if(meta.soundOn)SFX.pickup();
    }
  }

  if(p.y < -50) {
      hurtPlayer(0, 0, false); // fell into the dark
  }

  // Facing
  if(mx!==0)p.face=mx>0?1:-1;
  // Animation
  if(Math.abs(p.vx)>20&&p.onGround)p.runAnim+=dt*12;else p.runAnim*=0.85;

  // Attack
  if(p.atkCd>0)p.atkCd-=dt;
  if(p.atkTimer>0)p.atkTimer-=dt;
  if(input.attack&&p.atkCd<=0&&p.dodgeTimer<=0){
    input.attack=false; // prevent hold down spam
    const w=p.weapon,cd=w.cd/effAtkSpeed(p);
    p.atkCd=cd;p.atkTimer=w.cls==='melee'?0.26:0.18;p.swingId++;
    if(w.cls==='melee'){
      if(meta.soundOn)SFX.slash();
      // Open an active swing window — hits are resolved over several frames below,
      // so attacks landed while falling/landing or on enemies that step in mid-swing connect.
      p.swingT=0.20;p.swingHits=[];
    }else{
      if(meta.soundOn)(w.el?SFX.magic:SFX.shoot)();
      const pr=w.proj;
      G.projectiles.push({owner:'player',x:p.x+p.face*12,y:p.y+p.h*0.5,vx:p.face*pr.speed,vy:0,gravity:pr.gravity||0,size:pr.size,color:pr.color,shape:pr.shape,glow:pr.glow||0,dmg:w.dmg*effPower(p),kb:w.kb,pierce:pr.pierce||0,el:w.el,life:pr.range/pr.speed,hitSet:[]});
    }
  }

  // Active melee swing window
  if(p.swingT>0){
    p.swingT-=dt;
    const w=p.weapon;
    if(w.cls==='melee'){
      for(const e of G.enemies){
        if(e.dead||p.swingHits.indexOf(e)>=0)continue;
        const fwd=(e.x-p.x)*p.face;
        if(fwd>-(e.w/2+8)&&fwd<(w.range||50)+e.w/2){
          const vOv=Math.abs((p.y+p.h/2)-(e.y+e.h/2))<(p.h/2+e.h/2+12);
          if(vOv){p.swingHits.push(e);hitEnemy(e,w.dmg*effPower(p),p.face,w.kb,effLifesteal(p),w.el);}
        }
      }
      for(const o of G.obstacles){
        if(o.type!=='lever'||p.swingHits.indexOf(o)>=0)continue;
        if(Math.abs(o.x-p.x)<(w.range||50)+24&&p.y<o.y+80&&p.y+p.h>o.y-10){p.swingHits.push(o);pullLever(o);}
      }
    }
  }

  // Invulnerability/flash
  if(p.invuln>0)p.invuln-=dt;
  if(p.hurtFlash>0)p.hurtFlash-=dt;

  // Camera
  const targetCam=p.x-VW*0.35;G.cam+=(targetCam-G.cam)*0.08;
  if(G.cam<0)G.cam=0;if(G.cam>G.levelLength-VW)G.cam=G.levelLength-VW;
  const targetCamY=Math.max(0,p.y-(GROUND_Y-260));
  G.camY=(G.camY||0)+(targetCamY-(G.camY||0))*0.1;

  // Enemies
  for(const e of G.enemies){
    if(e.dead)continue;
    e.bob+=dt*4;if(e.hitFlash>0)e.hitFlash-=dt;
    if(e.hurtKb>0){e.hurtKb-=dt;e.x+=e.vx*dt;e.vx*=0.85;}
    else e.vx=0;

    // Activate when player is near
    if(!e.active&&Math.abs(e.x-p.x)<VW*0.6)e.active=true;
    if(!e.active)continue;

    const dir=Math.sign(p.x-e.x)||1;e.face=dir;
    const eff=e.speed*(1+G.stageIndex*0.01);

    if(e.boss){
      // Boss AI
      if(e.atkTimer>0)e.atkTimer-=dt;if(e.shootT>0)e.shootT-=dt;
      const dist=Math.abs(p.x-e.x);
      if(e.lunge>0){e.lunge-=dt;e.x+=dir*eff*2.6*dt;}
      else{
        if(e.kite&&dist<210)e.x-=dir*eff*0.6*dt;else e.x+=dir*eff*0.7*dt;
        if(!e.kite&&dist<120&&e.atkTimer<=0){e.lunge=0.45;e.atkTimer=1.8;G.shake=Math.min(G.shake+5,11);}
      }
      if(e.ranged&&e.shootT<=0&&Math.abs(p.x-e.x)<2000){bossShoot(e,p);e.shootT=e.shootCd*(e.phase>=2?0.7:1);}
      if((e.type==='king'||e.type==='tyrant')&&e.hp/e.maxHp<0.7){e.summonT-=dt;if(e.summonT<=0){
          e.summonT=e.type==='tyrant'?4:5;
          e.x = p.x + (Math.random()<0.5?110:-110);
          e.y = p.y + 90;
          e.hitFlash = 0.3; G.shake = 6;
          addText(e.x,GROUND_Y-e.h-10,'TELEPORT!','#c47bff',true);
      }}
      if((e.type==='sorcerer'||e.type==='colossus')&&e.hp/e.maxHp<0.8){e.aoeT-=dt;if(e.aoeT<=0){
          e.aoeT=3.5;
          G.aoes.push({x: p.x, r: e.type==='colossus'?80:60, t: 1.2, dmg: e.dmg*1.4, color: e.type==='sorcerer'?'#7fd6ff':'#ff7a3a'});
          addText(e.x,GROUND_Y-e.h-10,'MAGIC!',e.type==='sorcerer'?'#7fd6ff':'#ff7a3a',true);
      }}
      if(e.hp/e.maxHp<0.35&&e.phase<2){e.phase=2;e.speed*=1.22;
        if(e.type==='king'){e.ranged=true;e.shot={count:3,spread:0.22,speed:380,size:8,color:'#c47bff',shape:'orb',el:'void',glow:1};e.shootCd=2.0;e.shootT=0.8;}
        addText(e.x,GROUND_Y-e.h-20,'ENRAGED!','#ff5e54',true);}
      // Boss HP bar
      if(!e.dead){document.getElementById('bosshpwrap').classList.add('on');document.getElementById('bossname').textContent=e.label;document.querySelector('#bosshp > i').style.width=Math.max(0,e.hp/e.maxHp*100)+'%';}
    }else{
      // Normal enemy AI
      if(e.kind==='fly'){
        e.x+=dir*eff*0.6*dt;
        e.y=40+Math.sin(e.bob)*12;
      }else{
        e.x+=dir*eff*0.7*dt;
      }
    }
    
    // Enemy Gravity & Collision
    if(e.kind !== 'fly') {
        const oldY = e.y;
        e.vy += 1400*dt; e.y -= e.vy*dt;
        const eFloor = getFloorY(e.x, oldY);
        if(e.y <= eFloor && e.vy > 0) { e.y = eFloor; e.vy = 0; }
        if(e.y < -50) { e.hp = 0; killEnemy(e); }
    }

    // Boundary
    if(e.x<24)e.x=24;if(e.x>G.levelLength-24)e.x=G.levelLength-24;
    // Contact damage
    if(!e.dead&&Math.abs(e.x-p.x)<(e.w/2+p.w/2)){
      const vOv=Math.abs((e.y+e.h/2)-(p.y+p.h/2))<(e.h/2+p.h/2);
      if(vOv)hurtPlayer((e.boss&&e.lunge>0)?e.dmg*1.6:e.dmg,dir,e.boss);
    }
  }

  // Projectiles
  for(const pr of G.projectiles){
    pr.life-=dt;if(pr.gravity)pr.vy-=pr.gravity*dt;
    pr.x+=pr.vx*dt;pr.y+=(pr.vy||0)*dt;
    if(pr.owner==='player'){
      for(const e of G.enemies){if(e.dead||pr.hitSet.indexOf(e)>=0)continue;
        if(Math.abs(e.x-pr.x)<(e.w/2+pr.size)&&Math.abs(pr.y-(e.y+e.h/2))<(e.h/2+pr.size)){
          pr.hitSet.push(e);hitEnemy(e,pr.dmg,Math.sign(pr.vx)||1,pr.kb,effLifesteal(G.p),pr.el);
          if(pr.pierce>0)pr.pierce--;else{pr.life=0;break;}}}
      if(pr.life>0)for(const o of G.obstacles){
        if(o.type!=='lever')continue;
        if(Math.abs(pr.x-o.x)<22&&pr.y>o.y-6&&pr.y<o.y+86){pullLever(o);pr.life=0;break;}
      }
    }else{
      if(p.invuln<=0&&p.dodgeTimer<=0&&Math.abs(p.x-pr.x)<(p.w/2+pr.size)&&Math.abs(pr.y-(p.y+p.h/2))<(p.h/2+pr.size)){hurtPlayer(pr.dmg,Math.sign(pr.vx)||1,pr.isBoss);pr.life=0;}
    }
    if(pr.y<-4)pr.life=0;
  }
  G.projectiles=G.projectiles.filter(pr=>pr.life>0);

  // Pickups
  for(const pk of G.pickups){pk.bob=(pk.bob||0)+dt*4;
    if(Math.abs(pk.x-p.x)<34&&Math.abs(p.y-(pk.y||0))<40){
      if(pk.weapon)offerWeapon(pk.weapon);
      else if(pk.armor)offerArmor(pk.armor);
      else if(pk.jetpack){p.hasJetpack=true;p.fuel=100;toast('Acquired <b style="color:#e8a33d">Jetpack</b>! (Hold Jump)');if(meta.soundOn)SFX.pickup();}
      pk.taken=true;
    }
  }
  G.pickups=G.pickups.filter(pk=>!pk.taken);

  // Portal
  if(G.portal){G.portal.t+=dt;if(Math.abs(p.x-G.portal.x)<40)nextStage();}

  // Particles & texts
  for(const pt of G.particles){pt.vy+=600*dt;pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.life-=dt;}
  G.particles=G.particles.filter(pt=>pt.life>0);
  for(const t of G.texts){t.y+=t.vy*dt;t.vy*=0.92;t.life-=dt;}
  G.texts=G.texts.filter(t=>t.life>0);

  if(queueLevelUp>0&&mode==='play'){queueLevelUp--;openLevelUp();}

  // AOE processing
  for(const a of G.aoes) {
      if(!a.fromPlayer) a.t -= dt;
      if(a.t <= 0 && !a.hit && !a.fromPlayer) {
          a.hit = true; a.life = 0.3;
          G.shake = Math.max(G.shake, 8);
          if(Math.abs(p.x - a.x) < a.r && Math.abs(p.y - (a.y||0)) < 60) hurtPlayer(a.dmg, Math.sign(p.x - a.x)||1, true);
      }
      if(a.fromPlayer && !a.hit) {
          a.hit = true; a.life = 0.3;
          for(const e of G.enemies) {
             if(Math.abs(e.x - a.x) < a.r && Math.abs(e.y - (a.y||0)) < 80) hitEnemy(e, a.dmg, Math.sign(e.x - a.x)||1, 200, 0, 'phys');
          }
      }
      if(a.hit) a.life -= dt;
  }
  G.aoes = G.aoes.filter(a => (a.hit ? a.life > 0 : true));

  hudUpdate();
}

function bossShoot(e,p){
  const cfg=e.shot,ox=e.x+e.face*10,oy=e.y+e.h*0.62;
  const dx=p.x-ox,dirX=Math.sign(dx)||1,t=Math.max(0.25,Math.abs(dx)/cfg.speed);
  for(let i=0;i<cfg.count;i++){
    const fan=(cfg.count>1?(i-(cfg.count-1)/2)*cfg.spread*260:0);
    const vx=dirX*cfg.speed;
    let vy=((p.y+p.h*0.5)-oy)/t + fan;if(cfg.gravity)vy+=cfg.gravity*0.5*t;
    G.projectiles.push({owner:'enemy',x:ox,y:oy,vx,vy,gravity:cfg.gravity||0,size:cfg.size,color:cfg.color,shape:cfg.shape,glow:cfg.glow||1,dmg:e.dmg*0.8,kb:120,pierce:0,el:cfg.el||null,life:2.6,hitSet:[],isBoss:e.boss});
  }
  if(cfg.el&&meta.soundOn)SFX.magic(cfg.el);else if(meta.soundOn)SFX.shoot();
}

/* ================================================================
   SECTION 10: STAGE FLOW
   ================================================================ */
function nextStage(){
  if(!G.tookDamage){meta.flawlessStages=(meta.flawlessStages||0)+1;}
  const ni=G.stageIndex+1;if(ni>=STAGES.length){winGame();return;}
  meta.bestStage=Math.max(meta.bestStage,ni);
  meta.run={ngPlus:G.ngPlus,ngHp:G.ngHp,ngDmg:G.ngDmg,stageIndex:ni,p:snapOf(G.p),base:G.baseLoadout};
  persist();loadStage(ni);if(meta.soundOn)SFX.pickup();
}
function continueRun(){
  if(!meta.run)return;queueLevelUp=0;
  const p=freshPlayer();
  G={p,stageIndex:0,enemies:[],particles:[],texts:[],pickups:[],projectiles:[],obstacles:[],aoes:[],cam:0,shake:0,
     ngPlus:meta.run.ngPlus,ngHp:meta.run.ngHp||1,ngDmg:meta.run.ngDmg||1,baseLoadout:meta.run.base||null,
     portal:null,stageBanner:0,killGoal:0,kills:0,boss:null,time:0,tookDamage:false,combo:0,comboT:0};
  restorePlayer(meta.run.p);loadStage(meta.run.stageIndex);restorePlayer(meta.run.p);
  if(!G.baseLoadout)G.baseLoadout=snapOf(G.p);
  mode='play';showOverlay(false);showGameUI(true);hudUpdate();
}
function restorePlayer(snap){
  const p=G.p;Object.assign(p,snap,{stats:Object.assign(p.stats,snap.stats)});
  if(!p.weapon||typeof p.weapon!=='object'||!p.weapon.cls)p.weapon=startWeapon();
  p.gear=cloneGear(snap.gear);recomputeArmor(p);p.hp=Math.min(snap.hp,effMaxHp(p));
  p.x=70;p.y=0;p.vx=0;p.vy=0;p.onGround=true;p.atkTimer=0;p.atkCd=0;p.invuln=0;p.dead=false;
}

/* ================================================================
   SECTION 11: RENDER
   ================================================================ */
function render(){
  const ctx=mainContext,s=STAGES[G?G.stageIndex:0];
  ctx.clearRect(0,0,VW,VH);
  // Sky
  const grd=ctx.createLinearGradient(0,0,0,VH);grd.addColorStop(0,s?s.sky:'#13151d');grd.addColorStop(1,'#070809');
  ctx.fillStyle=grd;ctx.fillRect(0,0,VW,VH);
  if(!G)return;
  const shx=(Math.random()-0.5)*G.shake,shy=(Math.random()-0.5)*G.shake;
  ctx.save();ctx.translate(-G.cam+shx,shy+(G.camY||0));

  // Parallax
  drawParallax(ctx,s);drawGround(ctx,s);

  // Portal
  if(G.portal)drawPortal(ctx,G.portal);

  // Render in order
  for(const o of G.obstacles){
    if(o.type==='plat')drawPlatform(ctx,o);
    else if(o.type==='spikes')drawSpikes(ctx,o);
    else if(o.type==='spring')drawSpring(ctx,o);
    else if(o.type==='lever')drawLever(ctx,o);
    else if(o.type==='sign')drawSign(ctx,o);
    else if(o.type==='check')drawCheckpoint(ctx,o);
    else if(o.type==='trap')drawTrap(ctx,o);
  }
  for(const a of G.aoes)drawAOE(ctx,a);
  if(G.portal)drawPortal(ctx,G.portal);
  for(const pk of G.pickups)drawPickup(ctx,pk);
  for(const e of G.enemies)if(!e.dead)drawEnemyFull(ctx,e);
  drawHeroFull(ctx,G.p);
  if(G.p.hasJetpack && G.p.fuel < 100){
      const fy = GROUND_Y-G.p.y-G.p.h-15;
      ctx.fillStyle='#000'; ctx.fillRect(G.p.x-16, fy, 32, 4);
      ctx.fillStyle='#e8a33d'; ctx.fillRect(G.p.x-16, fy, 32*(Math.max(0,G.p.fuel)/100), 4);
  }
  for(const pr of G.projectiles)drawProjectile(ctx,pr);

  // Particles
  for(const pt of G.particles){ctx.globalAlpha=Math.max(0,pt.life*2.5);ctx.fillStyle=pt.color;ctx.fillRect(pt.x-pt.sz/2,pt.y-pt.sz/2,pt.sz,pt.sz);}
  ctx.globalAlpha=1;
  // Floating text
  for(const t of G.texts){ctx.globalAlpha=Math.max(0,t.life*1.4);ctx.fillStyle=t.color;ctx.font=`800 ${t.big?20:14}px -apple-system,sans-serif`;ctx.textAlign='center';ctx.fillText(t.txt,t.x,t.y);}
  ctx.globalAlpha=1;ctx.restore();

  // Combo counter
  if(mode==='play'&&G.combo>=3){ctx.textAlign='center';ctx.fillStyle='#e8a33d';ctx.font='900 '+(15+Math.min(6,G.combo*0.2))+'px -apple-system,sans-serif';ctx.globalAlpha=Math.min(1,G.comboT);ctx.fillText(G.combo+' HITS',VW/2,VH*0.22);ctx.globalAlpha=1;}
  // Progress bar
  const pf=document.getElementById('progFill');if(pf)pf.style.width=Math.min(100,G.p.x/STAGES[G.stageIndex].len*100)+'%';
  // Stage banner
  if(G.stageBanner>0){const a=Math.min(1,G.stageBanner)*Math.min(1,(2.6-G.stageBanner)*3);
    ctx.globalAlpha=Math.max(0,a);ctx.textAlign='center';
    ctx.fillStyle='#fff';ctx.font='900 26px -apple-system,sans-serif';ctx.fillText(s.name.toUpperCase(),VW/2,VH*0.34);
    ctx.fillStyle='#e8a33d';ctx.font='800 12px -apple-system,sans-serif';ctx.fillText('STAGE '+(G.stageIndex+1)+' / '+STAGES.length,VW/2,VH*0.34+22);ctx.globalAlpha=1;}
}

function drawHeroFull(c,p){
  c.save();c.translate(p.x,GROUND_Y-p.y);
  shadow(c,2,15); drawHero(c,p);c.restore();
}
function drawEnemyFull(c,e){
  c.save();c.translate(e.x,GROUND_Y-e.y);
  shadow(c,2,e.w*0.52);
  if(e.element&&!e.boss){const ec=elColor(e.element);if(ec){c.save();c.globalAlpha=0.16+0.06*Math.sin(G.time*4+e.bob);c.fillStyle=ec;c.beginPath();c.ellipse(0,-e.h*0.5,e.w*0.62,e.h*0.6,0,0,6.28);c.fill();c.restore();}}
  let col=e.hitFlash>0?'#ffffff':e.color;c.scale(e.face,1);
  if(e.kind==='fly')drawFlyer(c,e,col);else if(e.boss)drawBoss(c,e,col);else drawGrunt(c,e,col);
  c.restore();
  if(!e.boss&&e.hp<e.maxHp){const by=GROUND_Y-(e.y+e.h)-10;c.fillStyle='#0008';c.fillRect(e.x-16,by,32,4);c.fillStyle='#e8453d';c.fillRect(e.x-16,by,32*(e.hp/e.maxHp),4);}
}
function drawPickup(c,pk){
  if(pk.jetpack){
      c.save();c.translate(pk.x,GROUND_Y-(pk.y||0)+Math.sin(pk.bob)*6);
      c.fillStyle='#8899aa';c.fillRect(-8,-12,16,24);
      c.fillStyle='#ff5500';c.fillRect(-4,12,8,6);
      c.restore();
      return;
  }
  const it=pk.weapon||pk.armor,rc=RARITY[it.rarity].color;
  c.save();c.translate(pk.x,GROUND_Y-(pk.y||0));shadow(c,2,12);
  c.translate(0,-26+Math.sin(pk.bob)*5);
  c.globalAlpha=0.16;c.fillStyle=rc;c.fillRect(-4,-44,8,64);
  c.globalAlpha=0.55;c.shadowColor=rc;c.shadowBlur=12;c.fillStyle=rc;c.beginPath();c.arc(0,0,13,0,6.28);c.fill();c.shadowBlur=0;c.globalAlpha=1;
  if(pk.weapon){c.rotate(-0.6);c.translate(-7,4);drawWeaponArt(c,pk.weapon);}
  c.restore();
}
function drawProjectile(c,pr){
  const ang=Math.atan2(-(pr.vy||0),pr.vx);
  c.save();c.translate(pr.x,GROUND_Y-pr.y);
  if(pr.glow){c.shadowColor=pr.color;c.shadowBlur=10;}c.fillStyle=pr.color;
  if(pr.shape==='arrow'){c.rotate(ang);c.fillRect(-8,-1.4,15,2.8);c.beginPath();c.moveTo(8,-3);c.lineTo(13,0);c.lineTo(8,3);c.closePath();c.fill();}
  else if(pr.shape==='bolt'){c.rotate(ang);c.fillRect(-8,-1.6,16,3.2);}
  else{c.beginPath();c.arc(0,0,pr.size,0,6.28);c.fill();c.globalAlpha=0.4;c.beginPath();c.arc(-pr.vx*0.012,(pr.vy||0)*0.012,pr.size*0.7,0,6.28);c.fill();}
  c.restore();c.shadowBlur=0;
}
function drawPlatform(c, o) {
  const s=STAGES[G.stageIndex];
  if(o.gate&&!gateOpen(o)){ // closed gate: faint outline hints at the bridge
    c.save();c.translate(o.x,GROUND_Y-o.y);c.globalAlpha=0.15;c.strokeStyle='#5fd17a';c.setLineDash([6,6]);c.strokeRect(-o.w/2,0,o.w,o.h);c.setLineDash([]);c.restore();return;
  }
  if(o.gone){
    if(o.fake)return; // fakes vanish in a poof
    c.save();c.globalAlpha=Math.max(0,1-(o.fall||0)/160);c.translate(o.x,GROUND_Y-o.y+(o.fall||0));
    c.fillStyle='#3a4250';c.fillRect(-o.w/2,0,o.w,o.h);c.restore();return;
  }
  let sx=0,sy=0;
  if(o.crT>0){sx=(Math.random()-0.5)*3;sy=(Math.random()-0.5)*3;}
  c.save();c.translate(o.x+sx,GROUND_Y-o.y+sy);
  const w=o.w,h=o.h;
  if(o.deep){
    const g=c.createLinearGradient(0,0,0,VH);g.addColorStop(0,tint(s.ground,'#000',0.35));g.addColorStop(0.5,s.ground);g.addColorStop(1,tint(s.ground,'#000',0.12));
    c.fillStyle=g;c.fillRect(-w/2,0,w,VH+600);
    c.fillStyle='rgba(255,255,255,0.09)';c.fillRect(-w/2,0,w,3);
  } else if(o.gate){
    const lv=G.levers[o.gate];
    c.globalAlpha=(lv&&lv.timer<1.4)?(0.35+0.5*Math.abs(Math.sin(G.time*14))):0.9;
    c.fillStyle='#24503a';c.fillRect(-w/2,0,w,h);
    c.fillStyle='#5fd17a';c.fillRect(-w/2,0,w,4);
    c.globalAlpha=1;
  } else {
    c.fillStyle='#3a4250';c.fillRect(-w/2,0,w,h);
    c.fillStyle='#515b6d';c.fillRect(-w/2,0,w,4);
    if(o.crumble){c.strokeStyle='rgba(0,0,0,0.4)';c.lineWidth=1.5;c.beginPath();c.moveTo(-w*0.3,2);c.lineTo(-w*0.2,h-2);c.moveTo(0,3);c.lineTo(w*0.1,h);c.moveTo(w*0.3,1);c.lineTo(w*0.25,h-3);c.stroke();}
    if(o.move){c.fillStyle='rgba(232,163,61,0.5)';c.fillRect(-w/2,h-3,w,3);}
  }
  c.restore();
}
function drawSpikes(c,o){
  const up=spikesUp(o),warn=spikesWarn(o);
  const ext=up?1:(warn?0.16:0.05);
  c.save();c.translate(o.x,GROUND_Y-o.y);
  c.fillStyle='#1a1e26';c.fillRect(-o.w/2,-2,o.w,5);
  const n=Math.max(3,Math.round(o.w/16));
  c.fillStyle=up?'#c9d2dd':'#78828f';
  for(let i=0;i<n;i++){
    const x0=-o.w/2+i*(o.w/n),x1=x0+o.w/n;
    triC(c,x0+1,0,x1-1,0,(x0+x1)/2,-26*ext);
  }
  if(warn){c.fillStyle='rgba(255,94,84,0.8)';c.font='800 13px -apple-system';c.textAlign='center';c.fillText('!',0,-14);}
  c.restore();
}
function drawSpring(c,o){
  const sq=o.anim>0?0.5:1,H=18*sq;
  c.save();c.translate(o.x,GROUND_Y-o.y);
  c.strokeStyle='#8b8f9a';c.lineWidth=2.5;
  c.beginPath();c.moveTo(-9,0);
  for(let i=1;i<=4;i++)c.lineTo((i%2?9:-9),-i*H/4);
  c.stroke();
  c.fillStyle='#e8a33d';rr(c,-16,-H-7,32,7,3);c.fill();
  c.fillStyle='#2a2c36';c.fillRect(-14,-2,28,4);
  c.restore();
}
function drawLever(c,o){
  const on=o.timer>0;
  c.save();c.translate(o.x,GROUND_Y-o.y);
  c.fillStyle='#2a2c36';rr(c,-10,-8,20,10,3);c.fill();
  c.save();c.rotate(on?0.7:-0.7);
  c.strokeStyle='#8b8f9a';c.lineWidth=4;c.lineCap='round';lineC(c,0,-4,0,-32);
  c.fillStyle=on?'#5fd17a':'#e8453d';c.beginPath();c.arc(0,-34,6,0,6.28);c.fill();
  c.restore();
  if(on){
    c.strokeStyle='#5fd17a';c.lineWidth=3;c.globalAlpha=o.timer<1.4?Math.abs(Math.sin(G.time*14)):0.8;
    c.beginPath();c.arc(0,-56,10,-Math.PI/2,-Math.PI/2+6.2832*(o.timer/o.dur));c.stroke();c.globalAlpha=1;
  }
  c.restore();
}
function drawSign(c,o){
  c.save();c.translate(o.x,GROUND_Y-o.y);
  c.fillStyle='#5a4a30';c.fillRect(-3,-26,6,26);
  c.fillStyle='#7a6540';rr(c,-14,-38,28,14,3);c.fill();
  c.fillStyle='rgba(233,220,180,0.85)';c.font='800 11px -apple-system';c.textAlign='center';
  c.fillText(o.text,0,-48);
  c.restore();
}
function drawCheckpoint(c,o){
  const a=o.active;
  c.save();c.translate(o.x,GROUND_Y-o.y);
  c.strokeStyle='#8b8f9a';c.lineWidth=3;lineC(c,0,0,0,-56);
  c.fillStyle=a?'#5fd17a':'#4a4f5c';
  const wv=a?Math.sin(G.time*6)*3:0;
  c.beginPath();c.moveTo(0,-56);c.quadraticCurveTo(14+wv,-52,26+wv,-48);c.lineTo(0,-40);c.closePath();c.fill();
  if(a){c.globalAlpha=0.35+0.15*Math.sin(G.time*5);c.fillStyle='#5fd17a';c.beginPath();c.arc(0,-56,7,0,6.28);c.fill();}
  c.restore();
}
function drawTrap(c,o){
  c.save();c.translate(o.x,GROUND_Y-o.y);
  if(o.state==='idle'||o.state==='warn'){c.strokeStyle='rgba(255,255,255,0.15)';c.lineWidth=2;c.setLineDash([4,6]);lineC(c,0,-o.h,0,-o.h-400);c.setLineDash([]);}
  if(o.state==='warn')c.translate((Math.random()-0.5)*4,0);
  c.fillStyle='#4a4038';rr(c,-o.w/2,-o.h,o.w,o.h,4);c.fill();
  c.fillStyle='rgba(255,255,255,0.07)';c.fillRect(-o.w/2,-o.h,o.w,6);
  c.strokeStyle='rgba(0,0,0,0.35)';c.lineWidth=1.5;
  c.beginPath();c.moveTo(-o.w*0.2,-o.h+6);c.lineTo(-o.w*0.1,-8);c.moveTo(o.w*0.15,-o.h+4);c.lineTo(o.w*0.22,-6);c.stroke();
  if(o.state==='warn'||o.state==='falling')eyes(c,0,-o.h*0.6,'#200','#ff6a4a');
  c.restore();
}
function drawAOE(c, a) {
  c.save();c.translate(a.x,GROUND_Y-(a.y||0));c.scale(1,0.4);
  if(a.hit){
      c.fillStyle=a.color;c.globalAlpha=a.life/0.3;
      c.beginPath();c.arc(0,0,a.r,0,6.28);c.fill();
  }else{
      c.strokeStyle=a.color;c.lineWidth=2;c.globalAlpha=0.5+0.5*Math.sin(a.t*15);
      c.beginPath();c.arc(0,0,a.r,0,6.28);c.stroke();
      c.fillStyle='rgba(255,0,0,0.15)';c.fill();
  }
  c.restore();
}
function drawPortal(c,po){
  const t=po.t;c.save();c.translate(po.x,GROUND_Y);
  for(let i=0;i<3;i++){c.globalAlpha=0.5-i*0.12;c.fillStyle='#e8a33d';const r=42+i*12+Math.sin(t*3+i)*5;c.beginPath();c.ellipse(0,-58,r*0.55,r,0,0,6.28);c.fill();}
  c.globalAlpha=1;c.fillStyle='#fff';c.font='800 11px -apple-system';c.textAlign='center';c.fillText('ENTER →',0,-130);c.restore();
}
function drawParallax(c,s){
  const cam=G.cam,th=s.theme;
  if(th==='void'||th==='apex'){c.fillStyle='rgba(255,255,255,0.5)';for(let i=0;i<60;i++){const x=((i*137)%(VW+200))+-(cam*0.2%(VW+200));const y=(i*53)%(GROUND_Y-40);c.globalAlpha=0.2+0.5*((i*0.13)%1);c.fillRect(x,y,2,2);}c.globalAlpha=1;}
  if(th==='volcano'){const g=c.createLinearGradient(0,GROUND_Y-60,0,GROUND_Y);g.addColorStop(0,'rgba(255,90,30,0)');g.addColorStop(1,'rgba(255,90,30,0.18)');c.fillStyle=g;c.fillRect(cam-10,GROUND_Y-60,VW+20,60);}
  c.fillStyle='rgba(255,255,255,0.045)';
  for(let i=0;i<14;i++){const px=(i*260)-(cam*0.4)%(14*260);const h=90+(i%3)*30,w=70;c.beginPath();c.moveTo(px,GROUND_Y);c.lineTo(px+w*0.45,GROUND_Y-h);c.lineTo(px+w,GROUND_Y);c.closePath();c.fill();}
  c.fillStyle=(th==='void'||th==='apex')?'rgba(120,80,200,0.12)':'rgba(0,0,0,0.20)';
  for(let i=0;i<22;i++){const px=(i*180)-(cam*0.65)%(22*180);c.fillRect(px,GROUND_Y-130,24,130);}
}
function drawGround(c,s){
  const len=G.levelLength;
  const g=c.createLinearGradient(0,GROUND_Y,0,VH);g.addColorStop(0,tint(s.ground,'#000',0.35));g.addColorStop(0.5,s.ground);g.addColorStop(1,tint(s.ground,'#000',0.12));
  c.fillStyle=g;c.fillRect(0,GROUND_Y,len,VH-GROUND_Y+40);
  c.fillStyle='rgba(255,255,255,0.09)';c.fillRect(0,GROUND_Y,len,3);
  if(G&&G.obstacles){
      for(const o of G.obstacles)if(o.type==='pit'){
          c.fillStyle='#050608';
          c.fillRect(o.x-o.w/2,GROUND_Y,o.w,VH-GROUND_Y);
          c.fillStyle='rgba(0,0,0,0.5)';
          c.fillRect(o.x-o.w/2,GROUND_Y,o.w,10);
      }
  }
}

function hudUpdate(){
  if(!G)return;const p=G.p;
  document.getElementById('hpFill').style.width=Math.max(0,p.hp/effMaxHp(p)*100)+'%';
  document.getElementById('xpFill').style.width=Math.max(0,p.xp/p.xpNext*100)+'%';
  document.getElementById('lvlBadge').textContent='LV '+p.level;
  const wt=document.getElementById('weaponTag');
  wt.textContent=p.weapon.name+(G.ngPlus>0?' · NG+'+G.ngPlus:'');
  wt.style.color=RARITY[p.weapon.rarity]?RARITY[p.weapon.rarity].color:'var(--ink)';
  const at=document.getElementById('armorTag'),red=Math.round(defenseR(p)*100);
  const pips=SLOTIDS.map(s=>{const a=p.gear[s];return`<span class="pip" style="background:${a?a.color:'#333'}"></span>`;}).join('');
  at.innerHTML='🛡 <b style="color:'+bestGearRarity(p)+'">'+red+'%</b> '+pips;
  document.getElementById('bAttack').classList.toggle('ranged',p.weapon.cls==='ranged');
  document.getElementById('bAttack').textContent=p.weapon.cls==='ranged'?'FIRE':'SLASH';
}

const overlay=document.getElementById('overlay'),ovcard=document.getElementById('ovcard');
function showOverlay(v){overlay.classList.toggle('hide',!v);}
function showOvHTML(html){ovcard.innerHTML=html;showOverlay(true);}
function toast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>{t.classList.remove('show');toast._t=null;},2000);}
function resumePlay(){mode='play';showOverlay(false);hudUpdate();}

function titleScreen(){
  mode='title';showGameUI(false);document.getElementById('bosshpwrap').classList.remove('on');
  const hasRun=!!meta.run;
  showOvHTML(`<div class="card"><h1 class="title">BLADEFALL</h1><p class="subtitle">Action · Roguelite</p>
    ${hasRun?`<button class="bigbtn" id="contBtn">Continue — ${STAGES[meta.run.stageIndex].name}</button>`:''}
    <button class="bigbtn ${hasRun?'ghost':''}" id="newBtn">${hasRun?'New Run':'Start'}</button>
    <button class="bigbtn ghost" id="sndBtn">Sound: ${meta.soundOn?'On':'Off'}</button>
    <p class="hint"><b>Controls:</b> Arrows move · Space jump · <b>W attack</b> · <b>D dodge</b> · Esc pause<br>
      Loot weapons & 3-slot armor — neutral, elemental & ranged. Match elements to foes' weaknesses.<br>
      ${meta.ngPlus>0?`Best: <b>NG+${meta.ngPlus}</b> · `:''}
      <span style="opacity:.5">v${VERSION}</span></p></div>`);
  if(hasRun)document.getElementById('contBtn').onclick=continueRun;
  document.getElementById('newBtn').onclick=()=>beginRun(0,null,{hp:1,dmg:1});
  document.getElementById('sndBtn').onclick=()=>{
    meta.soundOn=!meta.soundOn;
    const m = document.getElementById('bgMusic');
    if(m) { if(meta.soundOn) { m.play().catch(()=>{}); } else { m.pause(); } }
    persist();titleScreen();
  };
}

function die(){
  mode='dead';if(meta.soundOn)SFX.hurt();
  const ng=G.ngPlus,base=G.baseLoadout,sc={hp:G.ngHp,dmg:G.ngDmg};meta.run=null;persist();
  showOvHTML(`<div class="card"><h2 class="title" style="font-size:42px;">YOU FELL</h2>
    <p class="ovsub">Reached ${STAGES[G.stageIndex].name} · Level ${G.p.level}${ng>0?' · NG+'+ng:''}</p>
    <button class="bigbtn" id="retryBtn">Try Again</button><button class="bigbtn ghost" id="menuBtn">Main Menu</button></div>`);
  document.getElementById('retryBtn').onclick=()=>beginRun(ng,ng>0?base:null,ng>0?sc:{hp:1,dmg:1});
  document.getElementById('menuBtn').onclick=titleScreen;
}
function winGame(){
  mode='win';if(meta.soundOn)SFX.win();const ng=G.ngPlus+1;
  const carry=snapOf(G.p),newScales=computeNgScales(G.p);
  meta.ngPlus=Math.max(meta.ngPlus,ng);meta.run=null;persist();
  showOvHTML(`<div class="card"><h2 class="title">VICTORY</h2><p class="ovsub">The Void Tyrant has fallen</p>
    <div class="statgrid"><div class="vsrow"><span>Final level</span><b>${G.p.level}</b></div>
      <div class="vsrow"><span>Weapon</span><b>${G.p.weapon.name}</b></div>
      <div class="vsrow"><span>Difficulty</span><b>NG+${G.ngPlus}</b></div></div>
    <p class="ovsub" style="margin-bottom:16px;">NG+${ng} — keep gear & stats. Foes scale to <b style="color:var(--danger)">×${newScales.hp.toFixed(1)} HP</b> · <b style="color:var(--danger)">×${newScales.dmg.toFixed(1)} dmg</b></p>
    <button class="bigbtn" id="ngBtn">Begin NG+${ng}</button><button class="bigbtn ghost" id="menuBtn2">Main Menu</button></div>`);
  document.getElementById('ngBtn').onclick=()=>beginRun(ng,carry,newScales);
  document.getElementById('menuBtn2').onclick=titleScreen;
}

  {n:'Second Wind',d:'Heal to full',icon:'+',apply:p=>{p.hp=effMaxHp(p);}}
];
function pick3(){const pool=[...UPGRADE_POOL];if(!G.p.hasSlam&&Math.random()<0.35)pool.push({n:'Ground Slam',d:'Press DOWN in air',icon:'⇓',apply:p=>{p.hasSlam=true;}});const out=[];while(out.length<3&&pool.length)out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);return out;}
function openLevelUp(){
  mode='upgrade';const opts=pick3();
  showOvHTML(`<div class="card"><p class="ovsub" style="color:var(--amber);letter-spacing:.22em;margin-bottom:2px;">LEVEL UP</p>
    <h2 class="ovh">You reached Level ${G.p.level}</h2><p class="ovsub">Choose an upgrade</p>
    <div class="choices">${opts.map((o,i)=>`<button class="choice" data-i="${i}"><div class="cname"><span>${o.icon}</span>${o.n}</div><div class="cdesc">${o.d}</div></button>`).join('')}</div></div>`);
  document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{opts[+b.dataset.i].apply(G.p);if(meta.soundOn)SFX.pickup();resumePlay();});
}

/* Weapon/Armor swap */
function fmt(n){return Math.round(n*100)/100;}
function offerWeapon(nw){
  const cur=G.p.weapon;
  const curDps = cur.dmg / cur.cd;
  const newDps = nw.dmg / nw.cd;
  if(newDps > curDps){
    G.p.weapon=nw;
    if(meta.soundOn)SFX.pickup();
    toast('Equipped: <b style="color:'+RARITY[nw.rarity].color+'">'+nw.name+'</b>');
  } else {
    toast('Ignored: <span style="opacity:0.5">'+nw.name+'</span>');
  }
}
function offerArmor(na){
  const cur=G.p.gear[na.slot];
  const curDef=cur?cur.defense:-1;
  if(na.defense > curDef){
    G.p.gear[na.slot]=na;recomputeArmor(G.p);G.p.hp=Math.min(G.p.hp,effMaxHp(G.p));
    if(meta.soundOn)SFX.pickup();
    toast('Equipped: <b style="color:'+RARITY[na.rarity].color+'">'+na.name+'</b>');
  } else {
    toast('Ignored: <span style="opacity:0.5">'+na.name+'</span>');
  }
}
function openPause(){
  mode='pause';
  showOvHTML(`<div class="card"><h2 class="ovh">Paused</h2>
    <button class="bigbtn" id="resBtn">Resume</button>
    <button class="bigbtn ghost" id="qmenu">Quit to Menu</button></div>`);
  document.getElementById('resBtn').onclick=()=>{mode='play';showOverlay(false);};
  document.getElementById('qmenu').onclick=titleScreen;
}

/* ================================================================
   SECTION 14: LITTLEJS LIFECYCLE BRIDGE
   ================================================================ */
function gameInit(){recalcVP();}
function gameUpdate(){const dt=1/60;update(dt);}
function gameUpdatePost(){}
function gameRender(){recalcVP();render();}
function gameRenderPost(){}

/* ================================================================
   SECTION 15: ENGINE BOOTSTRAP
   ================================================================ */
glEnable=false;
showSplashScreen=false;
engineInit(gameInit,gameUpdate,gameUpdatePost,gameRender,gameRenderPost,[],document.getElementById('gameContainer'));
titleScreen();

/* Debug hook */
window.__BF={get G(){return G;},get mode(){return mode;},get meta(){return meta;},VERSION,makeWeapon,makeArmor,rollRarity,STAGES,EARCH,ARCH,
  snap(){if(!G||!G.p)return{};const p=G.p;return{version:VERSION,mode,stage:G.stageIndex,stageName:STAGES[G.stageIndex].name,
    player:{x:Math.round(p.x),z:Math.round(p.z),jy:Math.round(p.jy),hp:Math.round(p.hp),maxHp:effMaxHp(p),lvl:p.level,weapon:p.weapon.name,weaponRarity:p.weapon.rarity},
    enemies:G.enemies.filter(e=>!e.dead).length,ngPlus:G.ngPlus};}};
</script>
